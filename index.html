// ---- Image preprocessing: crop out the top status-bar strip (which can contain
// a phone clock that gets misread as the run "time"), and downscale large
// screenshots so OCR runs faster. Returns {blob, width, height} of the
// processed image (height/width are of the CROPPED image actually sent to OCR).
function preprocessRunImage(file, opts){
  const cropTopFraction = (opts && opts.cropTopFraction!=null) ? opts.cropTopFraction : 0.06;
  const maxWidth = (opts && opts.maxWidth) || 1000;
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>{
      try{
        const srcW = img.naturalWidth, srcH = img.naturalHeight;
        const cropTop = Math.round(srcH * cropTopFraction);
        const cropH = srcH - cropTop;
        let outW = srcW, outH = cropH;
        if(outW > maxWidth){
          const scale = maxWidth / outW;
          outW = Math.round(outW * scale);
          outH = Math.round(outH * scale);
        }
        const canvas = document.createElement("canvas");
        canvas.width = outW;
        canvas.height = outH;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, cropTop, srcW, cropH, 0, 0, outW, outH);
        canvas.toBlob((blob)=>{
          if(blob) resolve({blob, width:outW, height:outH});
          else reject(new Error("canvas toBlob failed"));
        }, "image/png");
      }catch(e){ reject(e); }
    };
    img.onerror = ()=> reject(new Error("image load failed"));
    img.src = URL.createObjectURL(file);
  });
}

// ---- Fallback: pure text/regex parsing (used when bbox/line data isn't
// available, or to fill in any field the structured parser couldn't find).
function parseRunningOcr(text){
  const result = {distance:"", unit:"km", pace:"", time:"", calories:"", heartRate:"", elevation:"", cadence:""};
  if(!text) return result;
  const cleaned = text.replace(/,/g, ".");

  // Accept abbreviations (km/mi) directly after the number, OR spelled-out
  // unit words (Kilometers/Miles) appearing on their own nearby (common when
  // the number is on one row of a stat grid and the unit label is the row below).
  const distInline = cleaned.match(/(\d+(?:\.\d+)?)\s*(km|mi|miles?)\b/i);
  if(distInline){
    result.distance = distInline[1];
    result.unit = /mi/i.test(distInline[2]) ? "mi" : "km";
  } else {
    const unitWord = cleaned.match(/\b(kilometers?|miles?)\b/i);
    if(unitWord){
      result.unit = /mi/i.test(unitWord[1]) ? "mi" : "km";
      // grab the nearest standalone decimal/integer number anywhere in the text
      const num = cleaned.match(/\b(\d{1,3}\.\d{1,2})\b/) || cleaned.match(/\b(\d{1,3})\b/);
      if(num) result.distance = num[1];
    }
  }

  const pace = cleaned.match(/(\d{1,2})[':](\d{2})\s*(?:"|″)?\s*\/?\s*(km|mi)?/i);
  if(pace){ result.pace = `${pace[1]}'${pace[2]}"` + (pace[3] ? `/${pace[3].toLowerCase()}` : ""); }

  const timeLabeled = cleaned.match(/Time[^\d]{0,10}(\d{1,2}:\d{2}(?::\d{2})?)/i);
  if(timeLabeled){
    result.time = timeLabeled[1];
  } else {
    const longTime = cleaned.match(/\b(\d{1,2}:\d{2}:\d{2})\b/);
    if(longTime) result.time = longTime[1];
    // NOTE: deliberately no unanchored mm:ss fallback here anymore -- a bare
    // "9:25" pattern is indistinguishable from a phone status-bar clock, so
    // without a label or seconds component we leave it blank rather than guess.
  }

  const cal = cleaned.match(/(\d+)\s*(kcal|cal)\b/i);
  if(cal) result.calories = cal[1];

  const hr = cleaned.match(/(\d{2,3})\s*bpm/i);
  if(hr) result.heartRate = hr[1];

  const cad = cleaned.match(/(\d{2,3})[^\d]{0,15}cadence/i) || cleaned.match(/cadence[^\d]{0,10}(\d{2,3})/i);
  if(cad) result.cadence = cad[1];

  const elevA = cleaned.match(/(\d+(?:\.\d+)?)\s*m\b[^a-zA-Z]{0,15}(elev|gain)/i);
  const elevB = cleaned.match(/(elev|gain)[^\d]{0,10}(\d+(?:\.\d+)?)\s*m\b/i);
  if(elevA) result.elevation = elevA[1];
  else if(elevB) result.elevation = elevB[2];

  return result;
}

// Try to find a date the screenshot itself displays (e.g. "6/25/26" or
// "6/25/2026") and convert it to a YYYY-MM-DD key. Returns null if not found
// or if the result isn't a sane calendar date.
function parseRunningOcrDate(text){
  if(!text) return null;
  const m = text.match(/\b(\d{1,2})\/(\d{1,2})\/(\d{2,4})\b/);
  if(!m) return null;
  let month = parseInt(m[1],10), day = parseInt(m[2],10), year = parseInt(m[3],10);
  if(year < 100) year += 2000;
  if(month<1||month>12||day<1||day>31) return null;
  const mm = String(month).padStart(2,"0");
  const dd = String(day).padStart(2,"0");
  return `${year}-${mm}-${dd}`;
}

// ---- Structured (bounding-box) parsing. Stat-grid screenshots (Nike Run
// Club, Garmin Connect, etc.) typically show a row of big numbers with a row
// of labels directly below each one, repeated across several rows. Plain
// text regexes break on this because OCR linearizes the grid row-by-row, so
// a label's nearest number in the TEXT may actually belong to a different
// column. Instead, this groups words into visual rows by y-position, then
// matches each "label row" to the value row directly above it by x-position
// (column alignment) -- not by character distance in the linear text.
function groupWordsIntoRows(words){
  const sorted = words.slice().sort((a,b)=> a.bbox.y0 - b.bbox.y0);
  const rows = [];
  sorted.forEach(w=>{
    const cy = (w.bbox.y0 + w.bbox.y1) / 2;
    let row = rows.find(r => Math.abs(r.cy - cy) < (w.bbox.y1 - w.bbox.y0) * 0.6 + 6);
    if(!row){ row = {cy, words:[]}; rows.push(row); }
    row.words.push(w);
    row.cy = row.words.reduce((s,ww)=> s + (ww.bbox.y0+ww.bbox.y1)/2, 0) / row.words.length;
  });
  rows.sort((a,b)=> a.cy - b.cy);
  rows.forEach(r => r.words.sort((a,b)=> a.bbox.x0 - b.bbox.x0));
  return rows;
}

const RUN_LABEL_PATTERNS = {
  distance: /kilometers?|miles?\b|^km$|^mi$/i,
  pace: /pace/i,
  time: /\btime\b|duration|moving\s*time|elapsed/i,
  calories: /calor/i,
  heartRate: /heart|bpm/i,
  elevation: /elev/i,
  cadence: /cadence/i
};

function isNumberLikeWord(text){
  const cleaned = text.replace(/,/g, ".");
  return /\d/.test(cleaned) && /^[\d:.'"″′\-]+$/.test(cleaned);
}

function centerX(w){ return (w.bbox.x0 + w.bbox.x1) / 2; }

// Split a row's words into column groups based on horizontal gaps -- words
// close together (e.g. "Avg." + "Pace", or "Elevation" + "Gain") belong to
// the same stat column; a bigger gap starts a new column. This is what lets
// us tell "Calories | Elevation Gain | Cadence | Avg Heart Rate" apart as 4
// separate stats instead of one long blob of label text.
function clusterRowIntoColumns(row, gapThreshold){
  const gap = gapThreshold || 42;
  const words = row.words.slice().sort((a,b)=> a.bbox.x0 - b.bbox.x0);
  const cols = [];
  let current = null, lastX1 = null;
  words.forEach(w=>{
    if(current && (w.bbox.x0 - lastX1) <= gap){
      current.words.push(w);
    } else {
      current = {words:[w]};
      cols.push(current);
    }
    lastX1 = w.bbox.x1;
  });
  cols.forEach(c=>{
    c.x0 = Math.min(...c.words.map(w=>w.bbox.x0));
    c.x1 = Math.max(...c.words.map(w=>w.bbox.x1));
    c.cx = (c.x0 + c.x1) / 2;
    c.text = c.words.map(w=>w.text).join(" ");
  });
  return cols;
}

function normalizeFieldValue(field, rawWordsText){
  const cleaned = rawWordsText.replace(/,/g, ".");
  if(field==="distance"){
    // Normal case: OCR kept the decimal point, e.g. "5.90".
    let m = cleaned.match(/(\d{1,3}\.\d{1,2})/);
    if(m) return m[1];
    // OCR sometimes drops a thin decimal point entirely, leaving the integer
    // and fractional parts as two separate tokens, e.g. "5.90" -> "5 90".
    // If we see exactly that shape (small int, then 1-2 digit group), treat
    // it as a decimal rather than truncating to just the first number.
    m = cleaned.match(/^\s*(\d{1,3})\D{1,3}(\d{1,2})\s*$/);
    if(m) return `${m[1]}.${m[2]}`;
    m = cleaned.match(/(\d{1,3})/);
    return m ? m[1] : "";
  }
  if(field==="time"){
    // Normal case: colons survived OCR, e.g. "32:15" or "1:02:15".
    let m = cleaned.match(/(\d{1,2}:\d{2}:\d{2})/) || cleaned.match(/(\d{1,2}:\d{2})/);
    if(m) return m[1];
    // OCR sometimes drops thin colons, leaving each time segment as its own
    // token, e.g. "32:15" -> "32 15" or "1:02:15" -> "1 02 15". Reconstruct
    // from 2-3 number groups rather than losing the value entirely.
    const nums = cleaned.match(/\d{1,2}/g);
    if(nums && nums.length>=2 && nums.length<=3){
      const padded = nums.map((n,idx)=> idx===0 ? n : n.padStart(2,"0"));
      return padded.join(":");
    }
    return "";
  }
  if(field==="pace"){
    const m = cleaned.match(/(\d{1,2})[':″′]\s*(\d{2})/);
    return m ? `${m[1]}'${m[2]}"` : "";
  }
  if(field==="calories" || field==="cadence" || field==="heartRate"){
    if(/^-+$/.test(cleaned.trim())) return ""; // e.g. "--" meaning no data
    const m = cleaned.match(/(\d{1,3})/);
    return m ? m[1] : "";
  }
  if(field==="elevation"){
    const m = cleaned.match(/(\d+(?:\.\d+)?)/);
    return m ? m[1] : "";
  }
  return "";
}

function parseRunningOcrWords(words){
  const result = {distance:"", unit:"km", pace:"", time:"", calories:"", heartRate:"", elevation:"", cadence:""};
  if(!words || words.length===0) return result;
  const rows = groupWordsIntoRows(words);
  const claimed = {};

  for(let i=0; i<rows.length; i++){
    const labelCols = clusterRowIntoColumns(rows[i]);
    // find the nearest row ABOVE this one that looks like it holds values
    let valueRow = null;
    for(let j=i-1; j>=0 && j>=i-3; j--){
      if(rows[j].words.some(w=> isNumberLikeWord(w.text))){ valueRow = rows[j]; break; }
    }
    if(!valueRow) continue;
    const valueCols = clusterRowIntoColumns(valueRow);

    // "Hero" stat screens (e.g. a giant "5.92" distance number above a single
    // "Kilometers" label) often render the number in a huge font, so OCR's
    // bounding boxes for its digit groups can be spaced far enough apart that
    // clusterRowIntoColumns (tuned for normal-size stat-grid text) splits one
    // number into multiple "columns". When the label row has only ONE label,
    // there's no ambiguity about which value belongs to it, so use the whole
    // value row's text (in left-to-right order) instead of picking the single
    // nearest column -- this reassembles a hero number that got split apart.
    const combinedValueText = valueCols.map(c=>c.text).join(" ");

    labelCols.forEach(col=>{
      const field = Object.keys(RUN_LABEL_PATTERNS).find(f=> !claimed[f] && RUN_LABEL_PATTERNS[f].test(col.text));
      if(!field) return;
      let val;
      if(labelCols.length===1){
        val = normalizeFieldValue(field, combinedValueText);
      } else {
        // multiple stats share this row -- pick the value column horizontally
        // closest to this label column
        let best = null, bestDist = Infinity;
        valueCols.forEach(vc=>{
          const d = Math.abs(vc.cx - col.cx);
          if(d < bestDist){ bestDist = d; best = vc; }
        });
        if(!best) return;
        val = normalizeFieldValue(field, best.text);
      }
      if(!val) return;
      result[field] = val;
      claimed[field] = true;
      if(field==="distance"){
        result.unit = /mi/i.test(col.text) ? "mi" : "km";
      }
    });
  }
  return result;
}

// Some screenshots (esp. dark-mode running apps) render the small gray stat
// LABELS ("Kilometers", "Time", ...) too faintly for OCR to recognize at all,
// while the big bold VALUE numbers read fine. When that happens, the label-
// based parser above finds nothing, and a naive linear-text regex can latch
// onto an unrelated number elsewhere in the screenshot -- e.g. a route-map's
// "5 km" distance marker -- producing a wrong, truncated-looking value. This
// shape-based pass sidesteps labels entirely: a workout app's total-distance
// "hero" number is reliably the single largest-font number on the whole
// screen, and a real "Time" value is reliably the one number on the page
// shaped like mm:ss / hh:mm:ss. Both signals work even when every label is
// unreadable garbage.
function findHeroDistanceFromWords(words){
  if(!words || words.length < 2) return null;
  const rows = groupWordsIntoRows(words);
  let bestRow = null, bestAvgH = 0;
  rows.forEach(row=>{
    const numWords = row.words.filter(w=> isNumberLikeWord(w.text));
    if(numWords.length===0) return;
    const avgH = numWords.reduce((s,w)=> s + (w.bbox.y1-w.bbox.y0), 0) / numWords.length;
    if(avgH > bestAvgH){ bestAvgH = avgH; bestRow = row; }
  });
  if(!bestRow) return null;
  // Require the winning row's numbers to be meaningfully taller than other
  // number rows -- otherwise this isn't a "hero number" screen and guessing
  // would be unsafe.
  const otherHeights = rows.map(row=>{
    if(row===bestRow) return null;
    const nw = row.words.filter(w=> isNumberLikeWord(w.text));
    if(!nw.length) return null;
    return nw.reduce((s,w)=> s + (w.bbox.y1-w.bbox.y0), 0) / nw.length;
  }).filter(h=> h!==null);
  if(otherHeights.length){
    const avgOthers = otherHeights.reduce((a,b)=>a+b,0) / otherHeights.length;
    if(bestAvgH < avgOthers * 1.5) return null;
  }
  const cols = clusterRowIntoColumns(bestRow);
  const combined = cols.map(c=>c.text).join(" ");
  const value = normalizeFieldValue("distance", combined);
  if(!value) return null;
  // The unit label, if legible at all, usually sits directly below the hero
  // number -- check the next row down for "mi"/"miles" wording.
  const idx = rows.indexOf(bestRow);
  const labelRow = rows[idx+1];
  let unit = "km";
  if(labelRow){
    const labelText = labelRow.words.map(w=>w.text).join(" ");
    if(/\bmiles?\b|^mi$/i.test(labelText.trim())) unit = "mi";
  }
  return {value, unit};
}

// Find a clean mm:ss / hh:mm:ss token anywhere in the recognized text, used
// only when no labeled "Time" value could be found. Skips the very first
// line as a safety margin in case status-bar-clock text leaked past image
// cropping (a clock would normally appear before anything else OCR reads).
function findBareTimeInText(text){
  if(!text) return "";
  const lines = text.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  for(let i=1;i<lines.length;i++){
    const m = lines[i].match(/\b(\d{1,2}:\d{2}(?::\d{2})?)\b/);
    if(m) return m[1];
  }
  return "";
}

function parseRunningOcrShapeFallback(words, text){
  const result = {distance:"", unit:"km", pace:"", time:"", calories:"", heartRate:"", elevation:"", cadence:""};
  const hero = findHeroDistanceFromWords(words);
  if(hero){ result.distance = hero.value; result.unit = hero.unit; }
  const bareTime = findBareTimeInText(text);
  if(bareTime) result.time = bareTime;
  return result;
}

function flattenWordsFromTesseractData(data){
  const words = [];
  const collect = (blocks)=>{
    (blocks||[]).forEach(block=>{
      (block.paragraphs||[]).forEach(para=>{
        (para.lines||[]).forEach(line=>{
          (line.words||[]).forEach(w=>{
            if(w && w.bbox && w.text) words.push({text:w.text, bbox:w.bbox});
          });
        });
      });
    });
  };
  if(data.blocks && data.blocks.length) collect(data.blocks);
  else if(data.words && data.words.length){
    data.words.forEach(w=>{ if(w && w.bbox && w.text) words.push({text:w.text, bbox:w.bbox}); });
  }
  return words;
}

// Priority: label-based structured parse (most trustworthy when labels were
// readable) > shape-based parse (font-size/pattern heuristics, used when
// labels are unreadable) > naive whole-text regex (weakest signal, can latch
// onto unrelated numbers like a route-map distance marker, so it only fills
// whatever the first two passes couldn't find).
function mergeRunParseResults(structured, shape, fallback){
  const merged = {};
  ["distance","unit","pace","time","calories","heartRate","elevation","cadence"].forEach(field=>{
    merged[field] = (structured && structured[field]) ? structured[field]
      : (shape && shape[field]) ? shape[field]
      : ((fallback && fallback[field]) || (field==="unit" ? "km" : ""));
  });
  // If shape-based distance was used, its accompanying unit detection should
  // win too (don't let a leftover fallback "unit" override it).
  if((!structured || !structured.distance) && shape && shape.distance){
    merged.unit = shape.unit || merged.unit;
  }
  return merged;
}

function fillRunForm(p){
  document.getElementById("runDistanceInput").value = p.distance || "";
  document.getElementById("runUnitSelect").value = p.unit || "km";
  document.getElementById("runPaceInput").value = p.pace || "";
  document.getElementById("runTimeInput").value = p.time || "";
  document.getElementById("runCaloriesInput").value = p.calories || "";
  document.getElementById("runHeartRateInput").value = p.heartRate || "";
  document.getElementById("runElevationInput").value = p.elevation || "";
  document.getElementById("runCadenceInput").value = p.cadence || "";
}

async function handleRunImageSelected(event){
  const u = t();
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById("runOcrStatus");
  statusEl.textContent = u.ocrDownscaling;
  try{
    const processed = await preprocessRunImage(file, {cropTopFraction:0.06, maxWidth:1000});
    statusEl.textContent = u.ocrLoadingLib;
    await loadTesseract();
    statusEl.textContent = u.ocrRecognizing;
    const { data } = await Tesseract.recognize(processed.blob, 'eng', {
      blocks: true,
      logger: (m)=>{
        if(m && m.status === "recognizing text" && typeof m.progress === "number"){
          statusEl.textContent = `${u.ocrRecognizing} (${Math.round(m.progress*100)}%)`;
        }
      }
    });
    const text = data.text || "";
    document.getElementById("runRawText").value = text;

    const words = flattenWordsFromTesseractData(data);
    const structured = parseRunningOcrWords(words);
    const shape = parseRunningOcrShapeFallback(words, text);
    const fallback = parseRunningOcr(text);
    const merged = mergeRunParseResults(structured, shape, fallback);
    fillRunForm(merged);

    const detectedDate = parseRunningOcrDate(text);
    if(detectedDate){
      document.getElementById("runDateInput").value = detectedDate;
      statusEl.textContent = u.ocrDone + " " + u.ocrDateFound;
    } else {
      statusEl.textContent = u.ocrDone;
    }
  }catch(err){
    console.error(err);
    statusEl.textContent = u.ocrFailed;
  }
  event.target.value = "";
}

function saveRunEntry(){
  const u = t();
  const dateInput = document.getElementById("runDateInput").value;
  const date = dateInput || todayDateKey();
  const distance = document.getElementById("runDistanceInput").value.trim();
  const unit = document.getElementById("runUnitSelect").value;
  const pace = document.getElementById("runPaceInput").value.trim();
  const time = document.getElementById("runTimeInput").value.trim();
  const calories = document.getElementById("runCaloriesInput").value.trim();
  const heartRate = document.getElementById("runHeartRateInput").value.trim();
  const elevation = document.getElementById("runElevationInput").value.trim();
  const cadence = document.getElementById("runCadenceInput").value.trim();
  const raw = document.getElementById("runRawText").value;
  if(!distance && !time){ showToast(u.toastRunNeedData); return; }

  const runs = loadRuns();
  runs.unshift({date, distance, unit, pace, time, calories, heartRate, elevation, cadence, raw});
  saveRuns(runs);
  clearRunForm();
  renderRunHistory();
  renderRunCalendar();
  showToast(u.toastRunSaved);
}

function clearRunForm(){
  ["runDistanceInput","runPaceInput","runTimeInput","runCaloriesInput","runHeartRateInput","runElevationInput","runCadenceInput","runRawText"].forEach(id=>{
    document.getElementById(id).value = "";
  });
  document.getElementById("runDateInput").value = todayDateKey();
  document.getElementById("runOcrStatus").textContent = "";
}

function renderRunHistory(){
  const u = t();
  const list = document.getElementById("runHistoryList");
  const runs = loadRuns();
  if(runs.length===0){ list.innerHTML = `<div class="empty">${u.runHistoryEmpty}</div>`; return; }
  list.innerHTML = "";
  runs.forEach((r, idx)=>{
    const div = document.createElement("div");
    div.className = "historyitem";
    const distStr = r.distance ? `${r.distance}${r.unit}` : "";
    const parts = [
      distStr,
      r.pace || "",
      r.time ? `⏱ ${r.time}` : "",
      r.calories ? `${r.calories}kcal` : "",
      r.heartRate ? `${r.heartRate}bpm` : "",
      r.elevation ? `+${r.elevation}m` : "",
      r.cadence ? `${r.cadence}spm` : ""
    ].filter(Boolean);
    div.innerHTML = `<div class="hrow"><div class="hdate">${r.date}</div><button class="hDeleteBtn" data-idx="${idx}">🗑</button></div><div>${parts.join(' · ')}</div>`;
    div.querySelector(".hDeleteBtn").onclick = (e)=>{ e.stopPropagation(); deleteRunEntry(idx); };
    list.appendChild(div);
  });
}

function deleteRunEntry(index){
  const u = t();
  if(!confirm(u.historyDeleteConfirm)) return;
  const runs = loadRuns();
  runs.splice(index, 1);
  saveRuns(runs);
  renderRunHistory();
  renderRunCalendar();
  showToast(u.toastHistoryDeleted);
}

let runCalYear, runCalMonth;
function initRunCalendarState(){
  const d = new Date();
  runCalYear = d.getFullYear();
  runCalMonth = d.getMonth();
}
function runCalPrevMonth(){
  runCalMonth--; if(runCalMonth < 0){ runCalMonth = 11; runCalYear--; }
  renderRunCalendar();
}
function runCalNextMonth(){
  runCalMonth++; if(runCalMonth > 11){ runCalMonth = 0; runCalYear++; }
  renderRunCalendar();
}
function renderRunCalendar(){
  const runs = loadRuns();
  const runsByDate = {};
  runs.forEach(r=>{ if(!runsByDate[r.date]) runsByDate[r.date] = []; runsByDate[r.date].push(r); });
  buildCalendarGrid(runCalYear, runCalMonth, runsByDate, "runCal", (dateKey, entries)=>{
    const totalDist = entries.reduce((sum,e)=> sum + (parseFloat(e.distance)||0), 0);
    const unit = entries[0].unit || "km";
    showToast(`${dateKey}: ${totalDist.toFixed(2)}${unit} (${entries.length})`);
  });
}

let editingCat = null;
let editingId = null;

function openEditModal(cat, ex){
  editingCat = cat;
  editingId = ex.id;
  document.getElementById("modalNameInput").value = ex.name;
  document.getElementById("modalTipInput").value = ex.tip || "";
  document.getElementById("modalOverlay").classList.add("show");
}

function findExerciseById(cat, id){
  return (exercisesData[cat] || []).find(e => e.id === id);
}

function saveModalEdit(){
  if(!editingCat || !editingId) return;
  const ex = findExerciseById(editingCat, editingId);
  if(!ex){ closeModal(); return; }
  const newName = document.getElementById("modalNameInput").value.trim() || ex.name;
  const newTip = document.getElementById("modalTipInput").value;
  ex.name = newName;
  ex.tip = newTip;

  if(ex.custom){
    const custom = loadCustom();
    const arr = custom[editingCat] || [];
    const idx = arr.findIndex(e => e.id === editingId);
    if(idx > -1){ arr[idx].name = newName; arr[idx].tip = newTip; }
    custom[editingCat] = arr;
    saveCustom(custom);
  } else {
    const overrides = loadOverrides();
    overrides[editingId] = {name:newName, tip:newTip};
    saveOverrides(overrides);
  }

  if(todayState[editingId]){
    todayState[editingId].name = newName;
    saveToday();
  }

  closeModal();
  renderExerciseList();
  renderCounter();
  showToast(t().toastUpdated);
}

function deleteModalExercise(){
  if(!editingCat || !editingId) return;
  const cat = editingCat, id = editingId;
  const arr = exercisesData[cat] || [];
  const idx = arr.findIndex(e => e.id === id);
  const ex = idx > -1 ? arr[idx] : null;

  if(ex && ex.custom){
    const custom = loadCustom();
    if(custom[cat]) custom[cat] = custom[cat].filter(e => e.id !== id);
    saveCustom(custom);
  } else {
    const deleted = loadDeleted();
    if(!deleted.includes(id)) deleted.push(id);
    saveDeleted(deleted);
    const overrides = loadOverrides();
    delete overrides[id];
    saveOverrides(overrides);
  }
  if(idx > -1) arr.splice(idx, 1);

  if(todayState[id]){
    delete todayState[id];
    saveToday();
  }

  closeModal();
  renderExerciseList();
  renderCounter();
  showToast(t().toastDeleted);
}

function closeModal(){
  document.getElementById("modalOverlay").classList.remove("show");
  editingCat = null; editingId = null;
}
let toastTimer;

/* ===================== 쉬는시간 타이머 ===================== */
let restTimerInterval = null;
let restTimerEndAt = null;

function formatMMSS(totalSec){
  const sec = Math.max(0, Math.round(totalSec));
  const m = Math.floor(sec/60);
  const s = sec%60;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function startRestTimer(durationSec){
  clearInterval(restTimerInterval);
  restTimerEndAt = Date.now() + durationSec*1000;
  setRestTimerButtonsDisabled(true);
  updateRestTimerDisplay();
  restTimerInterval = setInterval(()=>{
    const remainingMs = restTimerEndAt - Date.now();
    if(remainingMs <= 0){
      clearInterval(restTimerInterval);
      restTimerInterval = null;
      document.getElementById("restTimerDisplay").textContent = "00:00";
      onRestTimerComplete();
      return;
    }
    updateRestTimerDisplay();
  }, 250);
}

function updateRestTimerDisplay(){
  if(!restTimerEndAt) return;
  const remainingSec = (restTimerEndAt - Date.now())/1000;
  document.getElementById("restTimerDisplay").textContent = formatMMSS(remainingSec);
}

function cancelRestTimer(){
  clearInterval(restTimerInterval);
  restTimerInterval = null;
  restTimerEndAt = null;
  document.getElementById("restTimerDisplay").textContent = "00:00";
  setRestTimerButtonsDisabled(false);
}

function setRestTimerButtonsDisabled(disabled){
  ["restTimer1Btn","restTimer2Btn","restTimer3Btn"].forEach(id=>{
    document.getElementById(id).disabled = disabled;
  });
}

function onRestTimerComplete(){
  setRestTimerButtonsDisabled(false);
  restTimerEndAt = null;
  try{ if(navigator.vibrate) navigator.vibrate([200,100,200]); }catch(e){}
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(AudioCtx){
      const ctx = new AudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.55);
      osc.onended = ()=>{ try{ ctx.close(); }catch(e){} };
    }
  }catch(e){}
  const widget = document.getElementById("restTimerWidget");
  widget.classList.add("flash");
  setTimeout(()=>{ widget.classList.remove("flash"); }, 600);
  showToast(t().toastRestOver);
}

function formatHMS(totalMs){

  const s = totalSec%60;
  if(h>0) return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

    // pause
    workoutTimerState.accumulatedMs = currentWorkoutElapsedMs();
    workoutTimerState.running = false;
    workoutTimerState.startedAt = null;
  } else {
    workoutTimerState.running = true;
    workoutTimerState.startedAt = Date.now();
  }
  saveWorkoutTimer();
  updateWorkoutTimerDisplay();
  refreshWorkoutTimerButton();
  ensureWorkoutTimerInterval();
}

function resetWorkoutTimer(){
  workoutTimerState.accumulatedMs = 0;
  workoutTimerState.running = false;
  workoutTimerState.startedAt = null;
  saveWorkoutTimer();
  updateWorkoutTimerDisplay();
  refreshWorkoutTimerButton();
  ensureWorkoutTimerInterval();
}

function initWorkoutTimerUI(){
  updateWorkoutTimerDisplay();
  refreshWorkoutTimerButton();
  ensureWorkoutTimerInterval();
}

/* ===================== 데이터 백업/복원 ===================== */
const BACKUP_KEYS = [
  STORAGE_KEY_LANG, STORAGE_KEY_NOTE, STORAGE_KEY_TITLE, STORAGE_KEY_RUNS,
  STORAGE_KEY_TODAY, STORAGE_KEY_HISTORY, STORAGE_KEY_CUSTOM, STORAGE_KEY_OVERRIDES,
  STORAGE_KEY_DELETED, STORAGE_KEY_TODAY_DATE, STORAGE_KEY_WORKOUT_TIMER
];

function exportBackup(){
  try{
    const data = {};
    BACKUP_KEYS.forEach(key=>{
      const val = localStorage.getItem(key);
      if(val !== null) data[key] = val;
    });
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `workout-backup-${todayDateKey()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 1000);
    showToast(t().toastBackupExported);
  }catch(e){
    showToast(t().toastBackupImportFailed);
  }
}

function importBackup(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      BACKUP_KEYS.forEach(key=>{
        if(Object.prototype.hasOwnProperty.call(data, key)){
          localStorage.setItem(key, data[key]);
        }
      });
      showToast(t().toastBackupImported);
      setTimeout(()=>{ location.reload(); }, 600);
    }catch(e){
      showToast(t().toastBackupImportFailed);
    }
  };
  reader.onerror = ()=>{ showToast(t().toastBackupImportFailed); };
  reader.readAsText(file);
  event.target.value = "";
}

applyStaticLanguage();
renderNoteBox();
renderCatbar();
renderExerciseList();
renderCatOptions();
renderCounter();
initCalendarState();
renderHistory();
renderCalendar();
initRunCalendarState();
document.getElementById("runDateInput").value = todayDateKey();
renderRunHistory();
renderRunCalendar();
initWorkoutTimerUI();
if(didResetForNewDay){ showToast(t().toastNewDay); }
</script>
