<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>나의 PT 운동 트래커</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#22262f; --accent:#5ad1c9;
    --accent2:#ff8a5b; --text:#eef0f3; --muted:#9aa3af; --good:#5ad1c9;
    --border:#2a2f3a;
  }
  *{box-sizing:border-box;}
  html, body{ overflow-x:hidden; max-width:100%; }
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:90px;
  }
  header{
    padding:18px 16px 10px; position:sticky; top:0; background:var(--bg); z-index:5;
    border-bottom:1px solid var(--border);
  }
  header h1{font-size:18px; margin:0 0 2px;}
  header .date{font-size:12px; color:var(--muted);}
  .notebox{
    margin:10px 16px 0; background:#2a2118; border:1px solid #4a3624; border-radius:10px;
    padding:10px 12px; font-size:12.5px; color:#ffcb9a; line-height:1.5; cursor:pointer;
  }
  .noteEditHint{color:#8a6a4a; font-size:11px;}
  nav.tabs{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--card);
    border-top:1px solid var(--border); z-index:9999;
    padding-bottom:env(safe-area-inset-bottom, 0px);
  }
  nav.tabs button{
    flex:1; padding:14px 0; background:none; border:none; color:var(--muted);
    font-size:14px; font-weight:600;
  }
  nav.tabs button.active{color:var(--accent);}
  .headerTop{display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .langToggle{
    flex:0 0 auto; background:var(--card2); border:1px solid var(--border); color:var(--accent);
    border-radius:20px; padding:6px 14px; font-size:12px; font-weight:700;
  }
  main{padding:14px 16px;}
  .tabpanel{display:none;}
  .tabpanel.active{display:block;}
  .catbar{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px;}
  .catbar button{
    flex:0 0 auto; padding:8px 14px; border-radius:20px; border:1px solid var(--border);
    background:var(--card); color:var(--text); font-size:13px; white-space:nowrap;
  }
  .catbar button.active{background:var(--accent); color:#06201e; border-color:var(--accent); font-weight:700;}
  .exrow{
    display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:10px 12px; margin-bottom:8px;
  }
  .exrow.selected{border-color:var(--accent); background:#16302d;}
  .exrow .check{
    width:22px;height:22px;border-radius:6px;border:2px solid var(--muted); flex:0 0 auto;
    display:flex;align-items:center;justify-content:center; font-size:13px;
  }
  .exrow.selected .check{background:var(--accent); border-color:var(--accent); color:#06201e;}
  .exrow .nameWrap{flex:1; min-width:0;}
  .exrow .name{font-size:14.5px;}
  .exTip{font-size:11.5px; color:var(--muted); margin-top:2px; word-break:break-all; line-height:1.4;}
  .exTip a{color:var(--accent2); text-decoration:underline;}
  .exrow .info{
    width:26px;height:26px;border-radius:50%; border:1px solid var(--border); background:var(--card2);
    color:var(--muted); font-size:13px; flex:0 0 auto;
  }
  .exrow .setstep{display:flex; align-items:center; gap:4px; flex:0 0 auto;}
  .exrow .setstep button{
    width:24px;height:24px; border-radius:6px; border:1px solid var(--border); background:var(--card2);
    color:var(--text); font-size:14px;
  }
  .exrow .setstep span{font-size:13px; width:34px; text-align:center; color:var(--muted);}
  .addbox{
    background:var(--card); border:1px dashed var(--border); border-radius:12px; padding:12px; margin-top:14px;
  }
  .addbox h3{margin:0 0 8px; font-size:14px;}
  .addbox input, .addbox select, .addbox textarea{
    width:100%; padding:9px 10px; margin-bottom:8px; border-radius:8px; border:1px solid var(--border);
    background:var(--card2); color:var(--text); font-size:13.5px;
  }
  .addbox button.submit{
    width:100%; padding:10px; border-radius:8px; border:none; background:var(--accent2); color:#231308;
    font-weight:700; font-size:14px;
  }
  .counter-card{
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:10px;
  }
  .counter-card .ctop{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .counter-card .ctop .cname{font-size:14.5px; font-weight:700;}
  .counter-card .ctop .actions{display:flex; gap:6px;}
  .counter-card .ctop .actions button{
    background:var(--card2); border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:4px 8px; font-size:12px;
  }
  .weightrow{display:flex; gap:8px; margin-top:10px;}
  .weightrow .weightInput{
    flex:1; padding:8px 10px; border-radius:8px; border:1px solid var(--border);
    background:var(--card2); color:var(--text); font-size:14px;
  }
  .weightrow .unitSelect{
    padding:8px 10px; border-radius:8px; border:1px solid var(--border);
    background:var(--card2); color:var(--text); font-size:14px;
  }
  .setdots{display:flex; gap:8px;}
  .setdots button{
    width:38px;height:38px;border-radius:50%; border:2px solid var(--border); background:var(--card2);
    color:var(--text); font-weight:700; font-size:14px;
  }
  .setdots button.done{background:var(--good); color:#06201e; border-color:var(--good);}

  /* 세트별 행 (reps stepper + per-set weight) */
  .setRows{display:flex; flex-direction:column; gap:8px;}
  .setRow{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .setDoneBtn{
    width:36px;height:36px;border-radius:50%; border:2px solid var(--border); background:var(--card2);
    color:var(--text); font-weight:700; font-size:13px; flex:0 0 auto;
  }
  .setDoneBtn.done{background:var(--good); color:#06201e; border-color:var(--good);}
  .repsStepper{display:flex; align-items:center; gap:4px; flex:0 0 auto;}
  .repsMinusBtn, .repsPlusBtn{
    width:36px;height:36px;border-radius:8px; border:1px solid var(--border); background:var(--card2);
    color:var(--text); font-size:16px; font-weight:700; flex:0 0 auto;
  }
  .repsValue{min-width:34px; text-align:center; font-size:13.5px; font-weight:700;}
  .repsUnit{font-size:11px; color:var(--muted); margin-left:-2px;}
  .setWeightInput{
    width:64px; padding:8px 6px; border-radius:8px; border:1px solid var(--border);
    background:var(--card2); color:var(--text); font-size:13.5px; text-align:center; flex:0 0 auto;
  }
  .unitRow{margin-top:10px; display:flex; justify-content:flex-end;}
  .unitRow .unitSelect{
    padding:8px 10px; border-radius:8px; border:1px solid var(--border);
    background:var(--card2); color:var(--text); font-size:13.5px;
  }

  /* 쉬는시간 타이머 */
  .restTimerWidget{
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:12px;
    transition:background .15s, border-color .15s;
  }
  .restTimerWidget.flash{background:var(--good); border-color:var(--good);}
  .restTimerTitle{font-size:13.5px; font-weight:700; margin-bottom:8px; color:var(--accent);}
  .restTimerRow{display:flex; gap:8px; margin-bottom:8px;}
  .restTimerOptBtn{
    flex:1; padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--card2);
    color:var(--text); font-weight:700; font-size:13.5px; min-height:36px;
  }
  .restTimerOptBtn:disabled{opacity:.5;}
  .restTimerStatusRow{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .restTimerDisplay{font-size:22px; font-weight:700; font-variant-numeric:tabular-nums;}
  .restTimerCancelBtn{
    padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--card2);
    color:#ff8a8a; font-weight:700; font-size:13px; min-height:36px;
  }

  /* 운동 시간 트래킹 */
  .workoutTimerWidget{
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:16px;
  }
  .workoutTimerTitle{font-size:13.5px; font-weight:700; margin-bottom:8px; color:var(--accent);}
  .workoutTimerDisplay{font-size:26px; font-weight:700; text-align:center; margin-bottom:10px; font-variant-numeric:tabular-nums;}
  .workoutTimerRow{display:flex; gap:8px;}
  .workoutTimerBtn{flex:1; padding:11px; border-radius:8px; border:none; font-weight:700; font-size:14px; min-height:36px;}
  .workoutTimerBtn.primary{background:var(--accent); color:#06201e;}
  .workoutTimerBtn.secondary{background:var(--card2); color:var(--text); border:1px solid var(--border);}
  .progresswrap{margin-bottom:16px;}
  .progressbar{height:8px; border-radius:6px; background:var(--card2); overflow:hidden;}
  .progressbar .fill{height:100%; background:var(--accent); width:0%; transition:width .25s;}
  .progresslabel{font-size:12px; color:var(--muted); margin-top:4px;}
  .empty{color:var(--muted); font-size:13.5px; text-align:center; padding:30px 10px;}
  .btnrow{display:flex; gap:8px; margin-bottom:12px;}
  .btnrow button{
    flex:1; padding:11px; border-radius:10px; border:none; font-weight:700; font-size:14px;
  }
  .btnrow .primary{background:var(--accent); color:#06201e;}
  .btnrow .secondary{background:var(--card2); color:var(--text); border:1px solid var(--border);}
  textarea#journalOutput{
    width:100%; min-height:260px; background:var(--card2); color:var(--text); border:1px solid var(--border);
    border-radius:10px; padding:12px; font-size:13.5px; line-height:1.6; white-space:pre-wrap;
  }
  .historyitem{
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:8px; font-size:13px;
  }
  .historyitem .hrow{display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;}
  .historyitem .hdate{color:var(--accent); font-weight:700;}
  .hDeleteBtn{background:none; border:none; color:#ff8a8a; font-size:15px; padding:2px 6px; cursor:pointer; line-height:1;}
  .calendarWrap{
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; margin-top:18px;
    width:100%; overflow:hidden; box-sizing:border-box;
  }
  .calHeader{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .calHeader button{
    background:var(--card2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:4px 12px; font-size:14px; font-weight:700;
  }
  .calHeader span{font-weight:700; font-size:14px; color:var(--accent);}
  .calWeekdays{display:grid; grid-template-columns:repeat(7, minmax(0,1fr)); text-align:center; font-size:11px; color:var(--muted); margin-bottom:6px; width:100%;}
  .calGrid{display:grid; grid-template-columns:repeat(7, minmax(0,1fr)); gap:3px; width:100%;}
  .calDay{
    aspect-ratio:1; min-width:0; max-width:100%; display:flex; align-items:center; justify-content:center; border-radius:8px;
    font-size:11px; color:var(--text); background:var(--card2); overflow:hidden;
  }
  .calDay.empty{visibility:hidden; background:none;}
  .calDay.marked{background:var(--accent); color:#06201e; font-weight:700; cursor:pointer;}
  .calDay.today{border:1.5px solid var(--accent);}
  .runLabel{display:block; font-size:12px; color:var(--muted); margin:8px 0 4px;}
  .runOcrStatus{font-size:12.5px; color:var(--accent); margin-top:8px; min-height:16px;}
  .runHint{font-size:12px; color:var(--muted); line-height:1.5; margin:0 0 10px;}
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; max-width:340px; width:100%;
  }
  .modal h4{margin:0 0 10px; font-size:15px; color:var(--accent);}
  .modal p{font-size:13.5px; line-height:1.6; color:var(--text); margin:0 0 14px;}
  .modal input, .modal textarea{
    width:100%; padding:9px 10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border);
    background:var(--card2); color:var(--text); font-size:13.5px;
  }
  .modal textarea{min-height:110px; line-height:1.5;}
  .modal button{width:100%; padding:10px; border-radius:8px; border:none; background:var(--accent); color:#06201e; font-weight:700;}
  .modal .modalBtnRow{display:flex; gap:8px; margin-bottom:8px;}
  .modal .modalBtnRow button{flex:1;}
  .modal button.modalDelete{background:#3a2230; color:#ff8a8a; border:1px solid #5a2e3a;}
  .modal button.modalClose{background:var(--card2); color:var(--muted); border:1px solid var(--border); margin-top:0;}
  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--accent); color:#06201e;
    padding:10px 18px; border-radius:20px; font-size:13px; font-weight:700; z-index:60; display:none;
  }
  a.condlink{color:var(--accent);}
</style>
</head>
<body>

<header>
  <div class="headerTop">
    <h1 id="appTitle" onclick="openTitleEdit()" style="cursor:pointer;">🏋️ 나의 PT 운동 트래커</h1>
    <button id="langToggle" class="langToggle" onclick="toggleLang()">EN</button>
  </div>
  <div class="date" id="todayLabel"></div>
</header>
<div class="notebox" id="noteBoxDisplay" onclick="openNoteEdit()">
  <span id="noteBoxPrefix">⚠️ 개인 특이사항:</span> <span id="noteBoxText">오른쪽 후인 약함 · 왼쪽 등 하부 활성 덜됨 · 오른쪽 둔근 활성도 낮음 · 발목 재활 진행 중</span>
  <span class="noteEditHint" id="noteEditHint"> (탭하여 수정)</span>
</div>

<main>
  <section class="tabpanel active" id="tab-select">
    <div class="catbar" id="catbar"></div>
    <div id="exerciseList"></div>

    <div class="addbox">
      <h3 id="addBoxTitle">➕ 직접 운동 추가</h3>
      <input id="newExName" placeholder="운동 이름 (예: 발목 누워서 밴딩)">
      <select id="newExCat"></select>
      <textarea id="newExTip" placeholder="PT 팁 / 메모 (선택)" rows="2"></textarea>
      <button class="submit" id="addSubmitBtn" onclick="addCustomExercise()">추가하기</button>
    </div>
  </section>

  <section class="tabpanel" id="tab-counter">
    <div class="restTimerWidget" id="restTimerWidget">
      <div class="restTimerTitle" id="restTimerTitle">⏳ 쉬는시간 타이머</div>
      <div class="restTimerRow">
        <button class="restTimerOptBtn" id="restTimer1Btn" onclick="startRestTimer(60)">1분</button>
        <button class="restTimerOptBtn" id="restTimer2Btn" onclick="startRestTimer(120)">2분</button>
        <button class="restTimerOptBtn" id="restTimer3Btn" onclick="startRestTimer(180)">3분</button>
      </div>
      <div class="restTimerStatusRow">
        <div class="restTimerDisplay" id="restTimerDisplay">00:00</div>
        <button class="restTimerCancelBtn" id="restTimerCancelBtn" onclick="cancelRestTimer()">취소</button>
      </div>
    </div>
    <div class="workoutTimerWidget" id="workoutTimerWidget">
      <div class="workoutTimerTitle" id="workoutTimerTitle">⏱️ 운동 시간</div>
      <div class="workoutTimerDisplay" id="workoutTimerDisplay">00:00</div>
      <div class="workoutTimerRow">
        <button class="workoutTimerBtn primary" id="workoutTimerStartPauseBtn" onclick="toggleWorkoutTimer()">시작</button>
        <button class="workoutTimerBtn secondary" id="workoutTimerResetBtn" onclick="resetWorkoutTimer()">초기화</button>
      </div>
    </div>
    <div class="progresswrap">
      <div class="progressbar"><div class="fill" id="progressFill"></div></div>
      <div class="progresslabel" id="progressLabel">0 / 0 세트 완료</div>
    </div>
    <div class="btnrow">
      <button class="secondary" id="resetAllBtn" onclick="resetAllSets()">↺ 전체 초기화</button>
      <button class="primary" id="completeAllBtn" onclick="completeAllSets()">✅ 전체 완료</button>
    </div>
    <div id="counterList"></div>
  </section>

  <section class="tabpanel" id="tab-journal">
    <div class="btnrow">
      <button class="primary" id="genJournalBtn" onclick="generateJournal()">📝 일지 자동 작성</button>
      <button class="secondary" id="copyJournalBtn" onclick="copyJournal()">📋 복사하기</button>
    </div>
    <textarea id="journalOutput" placeholder="오늘 운동을 선택하고 세트를 체크한 뒤, '일지 자동 작성'을 눌러보세요."></textarea>
    <div class="btnrow" style="margin-top:14px;">
      <button class="secondary" id="saveHistoryBtn" onclick="saveJournalToHistory()">💾 오늘 기록 저장</button>
    </div>
    <div class="calendarWrap" id="calendarWrap">
      <div class="calHeader">
        <button id="calPrevBtn" onclick="calPrevMonth()">‹</button>
        <span id="calTitle"></span>
        <button id="calNextBtn" onclick="calNextMonth()">›</button>
      </div>
      <div class="calWeekdays" id="calWeekdays"></div>
      <div class="calGrid" id="calGrid"></div>
    </div>
    <h3 style="font-size:14px; color:var(--muted); margin-top:18px;" id="historyHeader">지난 기록</h3>
    <div id="historyList"></div>

    <div class="addbox backupBox" style="margin-top:18px;">
      <h3 id="backupTitle">💾 데이터 백업</h3>
      <div class="btnrow">
        <button class="secondary" id="backupExportBtn" onclick="exportBackup()">내보내기</button>
        <button class="secondary" id="backupImportBtn" onclick="document.getElementById('backupImportInput').click()">가져오기</button>
      </div>
      <input type="file" id="backupImportInput" accept=".json" style="display:none" onchange="importBackup(event)">
    </div>
  </section>

  <section class="tabpanel" id="tab-running">
    <div class="addbox">
      <h3 id="runUploadTitle">📷 러닝 스크린샷으로 자동 등록</h3>
      <p class="runHint" id="runOcrHint">Nike Run Club 등 러닝 앱의 활동 화면을 캡처해서 올리면 거리·페이스·시간을 자동으로 인식해요.</p>
      <input type="file" id="runImageInput" accept="image/*" style="display:none" onchange="handleRunImageSelected(event)">
      <button class="submit" id="runUploadBtn" onclick="document.getElementById('runImageInput').click()">📷 스크린샷 선택</button>
      <div class="runOcrStatus" id="runOcrStatus"></div>
    </div>

    <div class="addbox" style="margin-top:14px;">
      <h3 id="runFormTitle">🏃 러닝 기록</h3>
      <label class="runLabel" id="runDateLabelText">날짜</label>
      <input type="date" id="runDateInput">
      <label class="runLabel" id="runDistanceLabelText">거리</label>
      <div style="display:flex; gap:8px;">
        <input type="text" inputmode="decimal" id="runDistanceInput" placeholder="예: 5.21" style="flex:1;">
        <select id="runUnitSelect" style="width:90px;">
          <option value="km">km</option>
          <option value="mi">mi</option>
        </select>
      </div>
      <label class="runLabel" id="runPaceLabelText">평균 페이스</label>
      <input type="text" id="runPaceInput" placeholder="예: 5'42&quot;/km">
      <label class="runLabel" id="runTimeLabelText">시간</label>
      <input type="text" id="runTimeInput" placeholder="예: 32:15">
      <label class="runLabel" id="runCaloriesLabelText">칼로리 (선택)</label>
      <input type="text" inputmode="numeric" id="runCaloriesInput" placeholder="예: 350">
      <label class="runLabel" id="runHeartRateLabelText">평균 심박수 (선택)</label>
      <input type="text" inputmode="numeric" id="runHeartRateInput" placeholder="예: 142">
      <label class="runLabel" id="runElevationLabelText">고도 상승 (선택)</label>
      <input type="text" id="runElevationInput" placeholder="예: 35m">
      <label class="runLabel" id="runCadenceLabelText">케이던스 (선택)</label>
      <input type="text" inputmode="numeric" id="runCadenceInput" placeholder="예: 112">
      <label class="runLabel" id="runRawTextLabelText">인식된 텍스트 (직접 수정 가능)</label>
      <textarea id="runRawText" rows="3"></textarea>
      <button class="submit" id="runSaveBtn" onclick="saveRunEntry()">저장</button>
    </div>

    <div class="calendarWrap" id="runCalendarWrap" style="margin-top:18px;">
      <div class="calHeader">
        <button id="runCalPrevBtn" onclick="runCalPrevMonth()">‹</button>
        <span id="runCalTitle"></span>
        <button id="runCalNextBtn" onclick="runCalNextMonth()">›</button>
      </div>
      <div class="calWeekdays" id="runCalWeekdays"></div>
      <div class="calGrid" id="runCalGrid"></div>
    </div>

    <h3 style="font-size:14px; color:var(--muted); margin-top:18px;" id="runHistoryHeader">러닝 기록 목록</h3>
    <div id="runHistoryList"></div>
  </section>
</main>

<nav class="tabs">

const exercisesData = {
  "등": [
    {name:"티바로우", tip:"상단그립 기준: 아래 발판을 밟고 그립을 잡은 뒤 가슴을 살짝 들어 등 상부에 저항이 걸리게 해주세요. 등 상부부터 당겨 등이 모이게 한 뒤 천천히 복귀, 팔이 아니라 날개뼈가 크게 움직여야 해요. 당기는 동안 복부를 단단히 고정해 몸통이 흔들리지 않게 하고, 끝에서 등 상부를 강하게 조여낸 뒤 다시 길게 늘려주세요. 오른쪽 후인이 약해서 오른쪽 당기는 힘과 등 상부 늘어남에 더 신경써주세요."},
    {name:"랫풀다운(오버그립)", tip:"하체를 단단히 고정해 엉덩이가 박히게 하고, 시선은 살짝 위, 가슴을 들고 날개뼈를 살짝 아래로 눌러 광배근에 먼저 힘이 들어간 상태에서 당기세요. 손으로 당긴다는 이미지보다 팔꿈치를 바닥으로 누른다고 생각하고, 올라가는 동작에서 이두가 아니라 광배근으로 버티는 것에 집중하세요. 가동범위는 광배근으로 통제 가능한 만큼만 — 과도하게 늘어나면 팔 사용이 늘어 광배근 집중이 풀려요."},
    {name:"랫풀다운(언더그립)", tip:"언더핸드 그립으로 근 길이 변화를 더 길게 가져가는 방식이에요. 몸쪽으로 당긴다는 느낌보다 팔꿈치를 눌러가며 당기고, 올라갈 때 어깨가 들리지 않게, 이두가 과하게 쓰이지 않게 주의하세요. 겨드랑이 쪽 광배근이 늘어나는 느낌에 최대한 집중해주세요."},
    {name:"랫풀다운(뉴트럴그립)", tip:"상체를 중립으로 세팅한 뒤, 당긴다는 이미지보다 앞을 긁어내린다는 느낌으로 팔꿈치를 눌러주세요. 올라갈 땐 광배근·전거근에 힘이 걸린 채 길게 늘어나는 것에 집중하고, 팔꿈치를 너무 내측으로 고정하지 않되 너무 열리지도 않게 해주세요."},
    {name:"바벨로우", tip:"데드리프트 끝동작에서 허벅지를 타고 당기는 동작이 추가된 거라고 생각하세요. 시작 전 광배근에 텐션이 걸린 상태여야 하고, 허벅지를 타고 올라오며 가슴을 열어 당기고 팔꿈치가 등 뒤에서 만난다는 느낌으로 강하게 수축하세요. 무릎이 앞으로 나가며 상체가 세워지지 않도록 주의하세요."},
    {name:"언더그립 바벨로우", tip:"광배근 사용에 더 유리한 그립이에요. 등 상부가 모이면(티바로우처럼) 위로 올리는 힘이 섞여 광배근 사용이 줄 수 있으니, 팔꿈치를 뒤로 보내 허벅지를 타고 그대로 뒤로, 팔꿈치가 등 뒤에서 만나며 몸통쪽으로 꽉 조이는 느낌으로 진행하세요. 오른쪽 광배근이 조금 더 강하게 쓰이는 느낌으로 해주세요."},
    {name:"원암 덤벨로우", tip:"한발은 벤치에, 반대발은 옆으로 밀어 골반 높이를 맞춰주세요(안 맞으면 허리가 말려요). 지지하는 팔은 살짝만 굽혀 중량을 받고, 가슴을 살짝 든 뒤 지지팔은 앞으로 밀고 당기는 팔은 골반쪽으로. 처음부터 끝까지 광배근 긴장이 풀리지 않게, 가동범위가 길어져도 힘이 풀린 채 늘어나지 않게 주의하세요."},
    {name:"투암 덤벨로우", tip:"벤트오버 자세로 눌러 잡고 복부를 단단히 고정하세요. 복부+엉덩이 텐션+허벅지 뒤쪽 텐션이 먼저 잡힌 상태에서 천천히 당겨야 몸통이 흔들리지 않아요. 등의 수축보다 복압을 잡는 것이 먼저예요."},
    {name:"원암 케이블로우", tip:"하이로우(위→아래) 방식: 몸통의 중립을 최대한 유지한 채 끝에서 근육을 쥐어짠다는 느낌으로. 끝에서 자극이 잘 안 느껴지면 살짝 멈췄다가 자세·인지를 체크하고 가동범위를 줄였다가 다시 늘려보세요. 올라가는 동작에서 너무 천천히 올리면 팔 사용이 늘어나니 자연스럽게 보내며 등에 저항이 걸리게 하세요."},
    {name:"시티드로우", tip:"수평으로 당기는 방식: 하체를 단단히 고정하고 명치쪽으로 당기다가 마지막에 가슴을 살짝 들어 등을 끝까지 수축하세요. 길게 늘리는 것보다 당기며 꽉 조이는 움직임에 더 신경쓰고, 오른쪽이 열리는 움직임을 더 강하게 신경써주세요."},
    {name:"케이블로우", tip:"좁은 그립/슈러그 버전: 아래에서 위로, 대각선 뒤쪽으로 으쓱하는 느낌으로 당기며 날개뼈가 길게 빠지는 느낌에 집중하세요. 팔 사용이 늘면 등 사용이 떨어지니 손은 그립에 걸어놓는다는 느낌으로 진행하세요."},
    {name:"언더그립 케이블로우", tip:"손바닥이 위로 가는 그립. 위로 당긴다는 느낌보다 팔꿈치를 아래로 누르며 당겨 광배근이 꽉 쥐어짜지게 하세요. 팔꿈치가 위로 당겨지면 광배근 사용이 떨어지고, 복부를 신경 쓰지 않으면 허리가 과하게 쓰일 수 있어요."},
    {name:"스트레이트암 풀다운", tip:"전거근을 더 쓰려면 가깝게 진행: 시작 자세에서 앞으로 살짝 밀어 전거근을 쓴 뒤 아래로 누르다가 광배근으로 자연스럽게 이어받아 당기세요. 너무 길게 움직여 어깨가 들리지 않게 주의하고, 좌우 차이가 있으면 왼쪽은 조금 아래로 누르듯, 오른쪽은 조금 더 앞으로 보내듯 잡아 균형을 맞추세요."},
    {name:"덤벨풀오버", tip:"자세가 말리면서 전거근 활성화도가 떨어지기 쉬우니, 처음부터 많이 넘기기보다 자연스럽게 힘이 들어가는 범위까지만 넘기며 전거근을 활성화하고 점차 길게 늘려가세요. 호흡은 저항이 걸린 상태에서 빠지지 않게, 덤벨이 머리 위로 올라왔을 때 호흡하세요. 생각보다 더 천천히(slow down more than you thought), 수축 시 팔꿈치를 몸쪽으로 모아 내리는 느낌으로, 최대로 넘어간 구간에서 힘이 풀리거나 급해지지 않게 부드럽게 움직이세요."},
    {name:"랙풀", tip:"기본 자세는 데드리프트와 동일하되, 중량이 등 상부에 걸리고 날개뼈가 열린 상태(흉추 살짝 굽음)를 만들어야 해요. 루마니안처럼 당겨 잡으면 들자마자 날개뼈가 뜯겨나가며 무너지니 주의. 중심은 살짝 뒤꿈치 쪽, 앞꿈치도 박아 넣고, 허리 커브가 꺾이지 않게 엉덩이를 늘리며 둔근·복부·광배근으로 골반을 펴는 느낌으로 일어나세요. 등 중부가 들어올려진다는 느낌으로, 옆구리까지 밀어내는 힘을 강하게 유지하세요."},
    {name:"루마니안 데드리프트", tip:"발 너비는 자연스럽게, 그립은 어깨너비. 가슴을 살짝 열어 날개뼈를 원위치(과하게 수축하면 복부가 밀려나오니 적당히)로. 바벨은 시작부터 끝까지 허벅지에서 떨어지지 않게 강하게 당겨 누르고, 인사하듯 골반을 뒤로 밀며 내려가고 올라올 땐 골반을 앞으로 밀어 올라오세요. 발앞꿈치가 처음부터 끝까지 꽉 눌려있어야 하고, 상체 움직임이 아닌 고관절 움직임으로 통제하세요."},
    {name:"컨벤셔널 데드리프트", tip:"고관절 움직임을 첫 번째로 신경쓰세요(중심·자극보다 중요, 부상과 직결). 상체를 들어올린다는 느낌이 아니라 바벨을 강하게 당기고 골반을 앞으로 밀어 고관절이 펴지는 느낌으로. 엉덩이는 위가 아니라 뒤로 든다는 생각, 들기 전 이미 바벨을 당기려는 힘 전달이 된 상태여야 해요. 순서: ①힙힌지 사이에 카드가 들어가게 잡기 ②정강이가 바에 닿을 때까지만 무릎 접고 상체는 세우지 않기 ③팔을 뽑듯 몸쪽으로 당겨오기 ④고관절을 뒤에서 앞으로 박으며 바를 몸쪽으로 가져오기. 시선은 바로 아래, 턱을 당겨 가슴이 들리지 않게 하세요."},
    {name:"스티프 데드리프트", tip:"엉덩이가 늘어나는 것, 고관절이 접히는 것에 최대한 집중해 길게 움직이세요. 복압을 강하게 잡아야 둔근·햄스트링을 더 효과적으로 늘릴 수 있어요."},
    {name:"원레그 데드리프트", tip:"한발로 데드리프트하며 엉덩이와 허벅지 후면을 늘리는 운동이에요. 지지하는 발 반대쪽 골반이 열리기 쉬우니 반대쪽 골반을 앞으로 밀어 정렬을 맞추고, 힙힌지를 잡으며 천천히 내려가 발바닥·균형 근육이 쓰이게 하세요. 상체가 내려가는 게 아니라 고관절이 접히는 만큼 상체가 따라 내려가야 합니다. 오른쪽은 특히 더 많이 늘려준다고 생각하고 진행하세요."}
  ],
  "가슴": [
    {name:"벤치프레스(SnG)", tip:"셋팅이 가장 중요: ①등을 모아 뒤로 박아넣기 ②바벨을 살짝 밀어내 등을 더 견고하게 ③하체를 밀어 등이 더 박히게 ④호흡을 크게 마셔 가슴 확장 후 복부 잠그기. 시선은 천장에 고정, 셋팅이 잡힌 채 바벨을 당기며 받으면 자연스럽게 명치 부근에 떨어져요. SnG는 가슴 위에서 2초 정지했다가 밀어 하단 힘을 키우는 목적입니다. 오른쪽 손목은 살짝 더 꺾어 고정, 밀어낸다는 느낌보다 들어올린다는 느낌으로, 너무 머리쪽으로 들어올리면 날개뼈가 빠지니 주의하세요."},
    {name:"벤치프레스(TnG)", tip:"가슴을 터치하고 바로 이어 밀 때 속도가 빨라지거나 급해지지 않게 하세요. 빨라지면 탄성에너지를 제대로 못 만들고, 급하면 최적의 밀어내는 타이밍을 놓쳐 더 무겁게 느껴져요. 가슴에 닿았을 때도 밀어내는 힘(긴장)은 계속 유지해야 합니다."},
    {name:"인클라인 벤치프레스", tip:"기본 각도 약 45도. 벤치프레스는 등을 뒤로 누르지만 인클라인은 아래로 누르듯 가슴을 들어올리고 복부를 당겨 몸통을 고정하세요. 하체도 아래로 밟는다는 느낌으로, 다 밀어내기보다 90%만 밀어 날개뼈가 빠지지 않게 하세요. 왼쪽 등 하부가 덜 내려가 어깨가 들리기 쉬우니 왼쪽을 더 구겨넣듯 잡아주고, 저항이 일정하게 걸리도록 속도 변화 없이 진행하세요."},
    {name:"덤벨 벤치프레스", tip:"바벨보다 몸통의 단단함이 덜하니 통제를 더 신경써 범위를 벗어나지 않게 하세요. 덤벨을 척골로 밀어낸다고 생각하고(엄지·검지 쪽으로만 밀면 흔들려요) 상하 움직임만 만들어내며, 올라가며 너무 모이거나 내려가며 너무 열리지 않게 주의하세요."},
    {name:"인클라인 덤벨 벤치프레스", tip:"가슴 사용에 최대한 집중, 팔꿈치가 너무 들리지 않게 주의하세요. 팔 각도는 85~90도가 좋고, 가슴이 잘 안 느껴지면 양 끝에서 멈춰 쥐어짜듯/찢어질 듯 늘린 채 진행하세요. 오른쪽 날개뼈가 조금 더 박히듯 잡고, 다 내려간 상태에서 광배근 힘이 풀려 팔꿈치가 어깨쪽으로 빠지지 않게 끝까지 쥐어짜세요."},
    {name:"플라이 머신", tip:"선피로 목적은 가슴 안쪽을 먼저 사용해 메인 운동 활성화를 높이는 것. 안쪽으로 모을 때 살짝 멈추듯 최대 단축성 수축을 만들고, 너무 빠르게 밀어넣으면 팔 사용이 늘어 가슴 수축이 떨어지니 일정한 속도로, 늘어나는 구간에도 집중하세요."},
    {name:"체스트프레스 머신", tip:"머신 특성상 안쪽으로 모이는 궤적이라 등을 박아넣기보다 자연스럽게 두고, 팔이 안쪽으로 모이며 가슴이 수축되는 데 집중하세요. 가슴이 떨어지면 어깨가 앞으로 밀려 수축이 떨어지니 주의. 왼쪽은 텐션이 풀렸다 팔과 같이 쓰이는 패턴이 자주 나오니 풀리지 않게, 오른쪽은 덜 늘어나니 더 늘리는 데 집중하세요."},
    {name:"케이블 크로스오버", tip:"좌우 센터(각도)를 잘 맞추세요. 팔이 열리며 중량을 받는 게 아니라 몸통이 열리며 받아야 하고(오른쪽이 더 많이 열리는 느낌으로), 단축성보다 신장성(늘어나는) 수축에 더 집중하세요."},
    {name:"원암 플라이", tip:"대각선으로 앉아 진행. 그립을 넘긴다는 느낌보다 가슴근육으로 당겨오고 윗팔뼈가 내측으로 당겨진다는 느낌으로 가슴 안쪽까지 쓰세요. 오른쪽 가슴 사용에 집중하고, 끝에서 멈췄다가 내측 수축 자극이 느껴지면 풀고 다시 진행 — 좌우 사용도를 비슷하게 맞춰주세요."},
    {name:"덤벨 플라이", tip:"가슴에서 텐션이 풀리지 않게(고립) 유지하세요. 왼쪽은 텐션 풀렸다 밀리지 않게, 오른쪽은 더 늘리는 데 집중. 덤벨을 너무 많이 모으면 팔 펴는 힘이 들어가 가슴 사용도가 떨어져요."}
  ],
  "어깨": [
    {name:"OHP", tip:"바벨을 처음 뽑을 때 척골(전완)이 바벨 바로 아래에 위치해야 관절 부담이 줄어요. 골반을 과감히 앞으로 밀고 복부 텐션을 강하게 줘서 등이 조여지고 바벨이 올라갈 공간을 만드세요. 순서: 엉덩이 조이며 앞으로 밀기 → 복부로 당겨오기 → 가슴 들고 등 조이기 → 팔꿈치 밀어넣으며 손목 세우기. 바벨은 얼굴을 스치듯 위로, 우측 승모근을 강하게 수축시킨다는 느낌으로 진행하세요."},
    {name:"시티드 OHP", tip:"서서 하는 OHP를 앉아서 한다고 생각하면 편해요. 상체를 안으로 넣어 으쓱하며 바벨을 꺼내고, 랫풀다운처럼 받아 들어올리며 으쓱하는 힘까지 더해 바벨을 천장에 붙인다는 느낌으로. 등 사용이 최대가 되어야 날개뼈 움직임과 안정성이 좋아져요. 오른쪽을 전거근부터 더 높게 올린다는 느낌으로, 복압과 발로 바닥을 누르는 힘도 함께 신경쓰세요."},
    {name:"스미스 OHP", tip:"고관절과 바벨의 축을 잘 맞추세요. 고관절이 바벨보다 뒤로 빠지면 등이 헐거워지고 허리가 꺾이고, 너무 앞으로 나가면 중심이 무너져요. 등의 사용에 집중하면 등과 바벨 사이의 어깨는 자연스럽게 쓰이게 됩니다."},
    {name:"핀프레스", tip:"하단 구간의 폭발적인 힘을 키우는 목적. 매회 랙에 완전히 내렸다가 다시 밀어내고, 받을 때는 자연스럽게 받으면 됩니다. 초기 바벨을 너무 가깝게 받으면 팔 사용이 늘어나니 주의하고, 하체로 밀어내는 힘과 위로 밀어내는 힘이 잘 맞아야 해요(몸이 들썩이면 안 됨)."},
    {name:"숄더프레스 머신", tip:"의자를 가장 아래로 낮춰 셋팅하고 몸통을 단단히 고정한 뒤, 삼각근이 잘 쓰이는 범위까지만 움직이세요. 너무 길게 움직이면 팔 사용이 늘어 어깨 사용이 떨어지고, 너무 깊게 내려오면 어깨에 부상 위험이 있어요. 네거티브 훈련 시엔 천천히 받아 어깨근육이 짧아진다는 느낌으로 들어올리세요."},
    {name:"레터럴레이즈", tip:"승모근과 함께 사용: 승모근을 수축시키면 최대 120도까지 올릴 수 있어요. 어깨보다 승모근이 약하면 충돌이 생길 수 있으니 높이를 조절하고, 오른쪽 승모근/삼각근 수축에 더 신경쓰세요. 윗팔뼈를 들어올린다는 느낌으로, 덤벨을 잡은 손은 헐겁지 않게 쥐어주세요."},
    {name:"원암 레터럴레이즈", tip:"상체를 기울인 상태로 진행해 하단 구간에서 힘이 풀리는 단점을 보완해요(몸통 유지 부담이 커지면 케이블로 대체). 팔꿈치가 올라간다는 느낌으로, 높이보다 삼각근 수축 자체에 집중하고 처음부터 끝까지 자극이 풀리지 않게 하세요."},
    {name:"시티드 레터럴레이즈", tip:"반동을 최대한 제한하고 삼각근만 쓰이게, 날개뼈가 모이지 않을 정도로만 움직이세요. 승모근과 같이 쓸 때는 팔꿈치를 들어올리고 손은 옆으로 밀어낸다는 느낌으로, 오른쪽 사용에 조금 더 집중하세요."},
    {name:"리버스플라이", tip:"몸 중심 기준 오른쪽이 더 열린다는 느낌으로, 등 상부(상부승모근)부터 수축시켜 자연스럽게 팔이 열리게 하세요. 팔을 뒤로 많이 보내는 것보다 등의 수축감에 집중하고, 천천히/부드럽게 — 빠르게 열거나 팔을 뒤로 밀면 수축도가 떨어지고 어깨가 앞으로 밀릴 수 있어요."},
    {name:"케이블 리버스플라이", tip:"좌우를 맞춘다는 느낌보다 오른쪽 후면삼각근을 더 강하게 쓴다는 느낌으로, 다만 몸이 돌지 않게 주의하세요. 후면삼각근만 잡기 어려우면 차라리 더 뒤로 당겨야 어깨가 안전해요."},
    {name:"아놀드프레스", tip:"손바닥이 안쪽으로 오게 잡고 시작. 팔꿈치가 옆으로 벌어지지 않게 들어올리고 이마를 지나면 팔꿈치를 밖으로 돌려 어깨를 수축시키세요. 팔이 아니라 몸통으로 들어올리는 느낌, 오른쪽이 조금 더 강하게 수축된다는 느낌으로 길게 움직이세요."},
    {name:"프론트레이즈", tip:"벤트오버 상태에서 손바닥이 위로 보이게 잡고, 들어올린다는 느낌보다 앞으로 밀어주는 느낌으로. 많이 올리는 것보다 반동 없이 어깨가 수축되며 앞으로 보내지는 것에 집중하세요."},
    {name:"뉴트럴그립 케이블 프론트프레스", tip:"팔꿈치만 앞으로 밀어내 전거근을 활성화한 뒤, 앞으로 미는 게 아니라 이마쪽으로 당기듯 들어올리세요. 팔꿈치가 열리지 않게, 높이보다 전거근+전면삼각근 사용에 집중하고 오른쪽을 더 신경쓰세요."},
    {name:"덤벨슈러그", tip:"바벨로우처럼 대각선 뒤로 빠진다는 느낌으로 당겨주세요. 몸이 왼쪽으로 돌면서 진행되기 쉬우니 골반부터 오른쪽으로 돌려 올바른 중립에서 진행하세요."},
    {name:"바벨슈러그", tip:"데드리프트하듯 살짝 내려간 상태에서 시작, 어깨가 앞으로 빠지며 들어올리지 않게 주의하세요. 바벨로우처럼 뒤로+위로 움직여야 상부승모근이 제대로 쓰입니다. 오른쪽 움직임에 더 집중하세요."},
    {name:"케이블슈러그", tip:"한 걸음 뒤로 빠진 뒤 데드리프트처럼 살짝 눌러앉고 몸통은 고정. 위로 당겨진다는 느낌보다 대각선 뒤로 당겨지는 느낌으로 상부승모근을 쓰세요. 어깨가 위로(견갑거근 사용) 가지 않고 뒤로 빠지게 신경쓰세요."},
    {name:"리버스슈러그", tip:"척추 중립을 만들고 복압을 잡은 뒤 상부승모근을 수축시키며 원판을 천장에 붙일 듯 올리세요. 척골을 위로 올린다는 느낌, 전거근부터 위로 들어올리는 느낌으로 — 오른쪽이 더 강하게 밀려야 합니다."}
  ],
  "하체": [
    {name:"백스쿼트", tip:"하이바 기준, 발 너비·발끝각을 타이트하게 맞춰 서세요. 뽑을 때부터 등을 강하게 당겨 박고 호흡을 크게 마셔 몸통을 단단히 만든 뒤 뽑으세요. 중심은 발앞꿈치가 눌리도록, 바벨과 중심이 맞으면 골반을 그대로 눌러 앉고, 일어날 땐 다리로 미는 게 아니라 골반을 들어올린다는 느낌(고관절이 먼저 움직인다고 생각)으로. 올라올 때 가슴을 먼저 열지 말고 같은 기울기를 유지한 채 골반을 앞으로 넣어 일어나세요. 무릎 소리/허벅지 전면에만 힘이 실리면 후면이 약한 신호이니 무리하지 마세요."},
    {name:"고블릿스쿼트", tip:"원판을 뒤꿈치에 받쳐 진행, 중심은 앞 7:뒤 3 정도로 분배하세요. 골반을 그대로 눌러 내려간 뒤 앞꿈치를 쭉 밀어내며 일어나세요."},
    {name:"브이스쿼트", tip:"무조건 깊게 내려가기보다 허벅지 앞쪽에 힘이 걸리는 곳까지만 내려가세요. 너무 깊으면 골반이 뒤로 빠져 힘점이 틀어져요. 앞꿈치가 들린 채로 지면을 누르는 느낌을 유지하고, 하단에서 텐션이 걸린 채 튕기듯 올라오세요(너무 느리게 내려가면 탄성에너지를 못 써요)."},
    {name:"불가리안 스쿼트", tip:"무릎이 바깥을 향하게(knees out) 유지하고, 살짝 후방경사를 만들어 골반 정렬을 잡으세요. 한쪽씩 진행하는 만큼 골반이 옆으로 빠지지 않도록 코어를 단단히 잡으세요."},
    {name:"스탠딩 아웃타이", tip:"손잡이는 중간/아래를 잡고 골반을 아래로 누르며 무릎을 열고 내려가세요. 무릎을 열어내는 것과 엉덩이를 조이는 데 집중하고, 천천히 — 오른쪽 둔근 활성도가 낮으니 오른쪽 둔근을 더 강하게 수축한다는 느낌으로, 다만 골반이 틀어지지 않게 주의하세요. 앞으로 살짝 숙이고 진행하면 엉덩이 아래쪽에 자극이 더 집중됩니다."},
    {name:"이너타이", tip:"내전근을 최대한 사용하도록 가능한 최대로 열어서 셋팅하고, 머신 축과 고관절을 맞추세요. 모이는 동작은 천천히 톡 닿는 느낌으로 컨트롤하고, 발이 무릎보다 안쪽으로 들어가지 않게(살짝 밖에) 해주세요. 뒤로 완전히 앉아서 진행하세요."},
    {name:"레그컬", tip:"손잡이를 당겨 의자를 앞으로 당겨 앉아 고관절 굴곡이 잘 나오게 하세요. 처음부터 끝까지 허벅지 뒤 근육이 짧아지고 늘어나는 것에 집중해 한순간도 힘이 풀리지 않게 진행하세요."},
    {name:"레그익스텐션", tip:"골반을 앞으로 밀어 허벅지 전면에 미리 부하가 걸리게 하세요. 무릎을 들어올리는 힘을 먼저 주고, 너무 끝까지 펴는 데만 집중하면 무릎 부담이 늘어나니 주의하세요. 세트 후 앉아서 쭉 눌러주는 스트레칭도 함께 해주세요."},
    {name:"킥스탠드 RDL", tip:"한쪽 발을 살짝 뒤로 빼고 지지하는 변형 RDL이에요. 골반과 몸통을 스퀘어(정면)로 유지하면서 지지하는 발과 균형 잡는 손 사이의 페어를 맞춰 진행하세요."}
  ],
  "팔": [
    {name:"라잉 트라이셉스 익스텐션", tip:"EZ바 기준: 누워서 바벨을 이마로 가져온 뒤 살짝 더 뒤로 보내 상완삼두근 장두에 중량이 걸리게 하세요. 팔을 접어 내려간 뒤 팔 자체를 더 넘겨 장두를 늘려주는 순서로 내려가고 역순으로 올라오세요. 바벨을 당기듯 밀면 팔꿈치에 통증이 생길 수 있으니 머리쪽으로 들어올려 장두에 저항이 계속 걸리게 하세요."},
    {name:"바벨컬", tip:"가슴을 들고 등 상부를 모은 상태에서 진행하세요. 팔꿈치를 고정한 뒤 이두 상부부터 끌어올린다고 생각하고 천천히(일정한 속도) 들어올려야 이두근으로 통제가 돼요. 고중량보다 근육 사용을 늘리는 방향으로, 왼쪽 수축이 더 떨어지니 왼쪽에 신경쓰세요."}
  ],
  "컨디셔닝": [

const EN_EX = {
  "등__b0":{name:"T-Bar Row", tip:"Overhand grip: plant your feet on the footplate, grab the handle, and lift your chest slightly so tension loads the upper back. Pull from the upper back to bring the shoulder blades together, then return slowly — the shoulder blades should move more than the arms. Keep your core locked so the torso doesn't sway during the pull, squeeze the upper back hard at the top, then stretch back out fully. Your right scapular retraction is weak, so pay extra attention to pulling power and stretch on the right side."},
  "등__b1":{name:"Lat Pulldown (Overhand)", tip:"Lock your lower body down so your hips are pinned, look slightly up, lift your chest, and press your shoulder blades slightly down so the lats are already engaged before you pull. Think 'press the elbows toward the floor' rather than 'pull with the hands,' and on the way up focus on controlling with the lats, not the biceps. Only use the range of motion your lats can control — overstretching shifts the work to your arms and breaks lat engagement."},
  "등__b2":{name:"Lat Pulldown (Underhand)", tip:"The underhand grip lets you take the lats through a longer stretch. Instead of 'pulling toward the body,' press the elbows down as you pull, and avoid letting the shoulders hike up or the biceps take over on the way up. Focus as much as possible on the stretch in the lats near the armpit."},
  "등__b3":{name:"Lat Pulldown (Neutral Grip)", tip:"Set your upper body neutral, then think 'rake downward and forward' rather than 'pull,' pressing the elbows down. On the way up, keep tension on the lats/serratus and focus on a long stretch — don't tuck the elbows too far in, but don't let them flare out either."},
  "등__b4":{name:"Barbell Row", tip:"Think of it as adding a pull along the thighs at the top of a deadlift. The lats should already be under tension before you start; as the bar travels up your thighs, open the chest and pull, squeezing hard as if the elbows meet behind your back. Don't let the knees drift forward or the torso stand up too tall."},
  "등__b5":{name:"Underhand Barbell Row", tip:"This grip favors lat engagement. If the upper back closes the way it does on a T-bar row, the pulling force can shift upward and reduce lat involvement — so drive the elbows straight back along the thighs and squeeze them together behind your back, pulling tight toward your torso. Aim to feel the right lat working slightly harder."},
  "등__b6":{name:"One-Arm Dumbbell Row", tip:"Put one knee on the bench and push the other leg out to the side so your hips stay level (if they're not level, your lower back will round). Bend the support arm slightly to take the load, lift your chest a touch, then push the support arm forward while pulling with the working arm toward your hip. Keep lat tension on throughout — don't let the range of motion get longer at the expense of losing tension."},
  "등__b7":{name:"Two-Arm Dumbbell Row", tip:"Set up in a bent-over stance and brace your core hard. Lock in ab tension + glute tension + hamstring tension first, then pull slowly so the torso doesn't sway. Bracing comes before the back contraction."},
  "등__b8":{name:"One-Arm Cable Row", tip:"High-to-low style: keep the torso as neutral as possible and squeeze hard at the end. If you can't feel it at the end, pause briefly to check your form/awareness, then shorten the range and gradually lengthen it again. Don't let the weight return too slowly — that increases arm involvement; let it return naturally while keeping resistance on the back."},
  "등__b9":{name:"Seated Row", tip:"Horizontal pulling style: lock the lower body, pull toward the solar plexus, then lift the chest slightly at the end to fully contract the back. Focus more on the squeeze at the end of the pull than on a long stretch, and pay extra attention to the right side opening up."},
  "등__b10":{name:"Cable Row (Shrug Variation)", tip:"Pull from low to high in a diagonal, shrugging motion toward the back, focusing on the shoulder blades sliding out long. If your arms take over, back engagement drops — think of your hands as hooks on the handle, not the prime movers."},
  "등__b11":{name:"Underhand Cable Row", tip:"Palms face up. Instead of 'pulling up,' press the elbows down as you pull so the lats get fully squeezed. If the elbows ride up, lat engagement drops, and if you don't brace your core, your lower back can take over too much."},
  "등__b12":{name:"Straight-Arm Pulldown", tip:"To engage the serratus more, work close to the body: from the start position, push slightly forward to activate the serratus, press down, then let the lats naturally take over the pull. Don't let the shoulders hike up from moving too far down. If you have a left-right imbalance, press the left side down a bit more and send the right side forward a bit more to balance things out."},
  "등__b13":{name:"Dumbbell Pullover", tip:"If your form collapses, serratus activation drops easily, so don't go too far back right away — only go as far as you can keep real tension, activating the serratus and gradually increasing the range over time. Breathe while the resistance is loaded; inhale when the dumbbell is overhead. Slow down more than you think you need to, draw the elbows in toward the body on the contraction, and stay smooth at the deepest point of the stretch instead of losing tension or rushing."},
  "등__b14":{name:"Rack Pull", tip:"Same base position as a deadlift, but you need the load on the upper back with the shoulder blades open (slight thoracic flexion). If you set up like a Romanian deadlift, your shoulder blades will get yanked apart the moment you lift — be careful. Keep your weight slightly toward the heels with the front of the foot also pressed down, and rise by extending the hips with the glutes/abs/lats without letting your lower back arch. Feel as if your mid-back is lifting, and keep strong pressure pushing out through your sides."},
  "등__b15":{name:"Romanian Deadlift", tip:"Natural foot width, shoulder-width grip. Open the chest slightly to return the shoulder blades to neutral (over-squeezing pushes the belly out, so keep it moderate). Keep the bar pressed against your thighs from start to finish, push your hips back like a bow as you descend, and drive your hips forward as you stand back up. Keep the balls of your feet pressed down the whole time, and control the movement through the hips, not the upper body."},
  "등__b16":{name:"Conventional Deadlift", tip:"Hip movement comes first (more important than the pump or mind-muscle connection — directly tied to injury risk). Instead of 'lifting the upper body,' pull the bar hard and drive your hips forward so the hips extend. Think of lifting the hips backward, not upward, and make sure the pulling force is already transmitted to the bar before you lift. Order: 1) grip as if a card were sandwiched in your hip hinge 2) bend the knees only until your shins touch the bar, without standing your torso up 3) pull the bar in toward your body as if yanking it 4) drive the hips from back to front to bring the bar in close. Look just below straight ahead and tuck your chin so your chest doesn't pop up."},
  "등__b17":{name:"Stiff-Leg Deadlift", tip:"Focus as much as possible on the stretch in the glutes and the hip hinge, moving through a long range. Brace hard so you can stretch the glutes/hamstrings more effectively."},
  "등__b18":{name:"Single-Leg Deadlift", tip:"A deadlift on one leg that stretches the glutes and hamstrings. The hip on the non-supporting side tends to open up, so push that hip forward to stay aligned, hold the hip hinge, and lower slowly so the foot and balance muscles engage. The torso should follow the hip hinge down, not move down on its own. Think of stretching the right side a bit more as you go."},

  "가슴__b0":{name:"Bench Press (Stop and Go)", tip:"Setup matters most: 1) pull the shoulder blades together and dig them back 2) push the bar slightly to lock the back in further 3) drive through the legs to lock the back in further 4) take a big breath to expand the chest, then brace the core. Keep your eyes fixed on the ceiling; once set up, pull the bar in as you receive it and it should naturally land near your solar plexus. Stop-and-go means pausing 2 seconds on the chest before pressing, to build bottom-end strength. Keep the right wrist angled and locked slightly more, think 'lift' rather than 'press,' and don't press too far toward your head or your shoulder blades will pull apart."},
  "가슴__b1":{name:"Bench Press (Touch and Go)", tip:"Don't speed up or rush right after touching your chest and pressing back up. Going too fast means you can't build elastic energy properly, and rushing means you miss the ideal pressing timing, making the weight feel heavier. Keep pressing tension active even at the moment you touch your chest."},
  "가슴__b2":{name:"Incline Bench Press", tip:"Default angle around 45 degrees. A flat bench press presses the back down, but on incline, lift the chest as if pressing down, and pull the abs in to lock the torso. Press down through the legs too, and don't press all the way out — press to about 90% so the shoulder blades don't pull apart. The left lower back tends to dip less, causing the shoulder to hike — dig the left side in more, and keep a steady speed throughout so resistance stays consistent."},
  "가슴__b3":{name:"Dumbbell Bench Press", tip:"Your torso is less locked in than with a barbell, so focus more on control to avoid drifting out of the groove. Think of pressing the dumbbells with the ulnar (pinky) side of the hand — pressing only with the thumb/index side causes wobble — and create pure up-and-down motion, being careful not to let the dumbbells drift too close together at the top or flare too wide at the bottom."},
  "가슴__b4":{name:"Incline Dumbbell Bench Press", tip:"Focus fully on using the chest, and don't let the elbows flare up too high. An arm angle of 85-90 degrees works well; if you can't feel your chest, pause at both ends and squeeze/stretch hard. Dig the right shoulder blade in a bit more, and keep squeezing all the way at the bottom so the lats don't relax and let the elbows drift toward the shoulders."},
  "가슴__b5":{name:"Pec Fly Machine", tip:"As a pre-exhaust move, the goal is to activate the inner chest first to boost activation for your main lift. Pause briefly as your hands come together for maximum peak contraction; pushing in too fast shifts work to the arms and reduces chest contraction, so keep a steady tempo and stay focused through the stretch portion too."},
  "가슴__b6":{name:"Chest Press Machine", tip:"Because of the machine's fixed path that brings the arms inward, let your back sit naturally instead of digging it in, and focus on the chest contracting as the arms come together. If the chest drops, the shoulders push forward and contraction suffers. The left side often loses tension and starts sharing work with the arm — keep it tight — and the right side tends to stretch less, so focus on stretching it more."},
  "가슴__b7":{name:"Cable Crossover", tip:"Match the left-right center/angle carefully. The torso should open to receive the load, not the arms (the right side tends to open more), and focus more on the eccentric (lengthening) contraction than the concentric."},
  "가슴__b8":{name:"One-Arm Cable Fly", tip:"Sit at a diagonal angle. Instead of 'swinging the handle over,' pull with the chest muscles and think of the upper arm bone being drawn inward to use the inner chest. Focus on right chest engagement, pause at the end, and once you feel the inner contraction, release and repeat — try to match left-right usage."},
  "가슴__b9":{name:"Dumbbell Fly", tip:"Keep tension on the chest without it relaxing (isolation). Don't let the left side lose tension and get pushed; focus on stretching the right side more. Bringing the dumbbells too close together engages the arm-extending muscles and reduces chest involvement."},

  "어깨__b0":{name:"Overhead Press", tip:"When you first un-rack the bar, your forearms should be directly under it to reduce joint stress. Drive your hips forward boldly and brace your abs hard so your back locks in and creates room for the bar to travel up. Order: squeeze glutes and push hips forward → pull in with the abs → lift the chest and lock the back → drive the elbows in and set the wrists. Press the bar up close to your face, and think of strongly contracting the right trapezius."},
  "어깨__b1":{name:"Seated Overhead Press", tip:"Think of it as doing a standing overhead press while seated. Pull your upper body in and shrug as you un-rack the bar, receive it like a lat pulldown, then add a shrugging force as you press so the bar finishes against the ceiling. Maximum back engagement gives you the best scapular movement and stability. Think of driving the right side up starting from the serratus, and also pay attention to core bracing and pressing your feet into the floor."},
  "어깨__b2":{name:"Smith Machine Overhead Press", tip:"Align your hips carefully with the bar's path. If your hips drift behind the bar, your back loosens and your lower back arches; if they drift too far forward, your balance breaks down. Focus on using your back, and the shoulders between your back and the bar will naturally engage."},
  "어깨__b3":{name:"Pin Press", tip:"The goal is building explosive power off the bottom. Lower the bar fully onto the pins each rep, then drive it back up; receive it naturally. If you catch the bar too close at the start, arm involvement increases — and the pressing force from your legs and the overhead pressing force need to sync (your body shouldn't bounce)."},
  "어깨__b4":{name:"Shoulder Press Machine", tip:"Set the seat as low as it goes, lock your torso in tight, and move only through the range where the deltoids are well engaged. Moving too far reduces shoulder involvement in favor of the arms, and going too deep risks shoulder injury. For negative-focused training, receive the weight slowly, imagining the shoulder muscle shortening as you press up."},
  "어깨__b5":{name:"Lateral Raise", tip:"Used together with the traps: contracting the traps lets you raise up to about 120 degrees. If your traps are weaker than your shoulders, impingement can occur, so adjust the height, and pay extra attention to right trap/deltoid contraction. Think of lifting the upper arm bone, and keep a firm (not loose) grip on the dumbbell."},
  "어깨__b6":{name:"One-Arm Lateral Raise", tip:"Leaning the torso to the side compensates for the loss of tension at the bottom of the range (switch to cable if maintaining torso position becomes too demanding). Think of lifting the elbow rather than chasing height, focus on the deltoid contraction itself, and don't let tension drop off at any point through the range."},
  "어깨__b7":{name:"Seated Lateral Raise", tip:"Limit momentum as much as possible so only the deltoid works, moving only enough that the shoulder blades don't come together. When combining with the traps, think 'lift the elbow, push the hand out to the side,' and focus a bit more on the right side."},
  "어깨__b8":{name:"Reverse Fly", tip:"Think of the right side opening more relative to your body's centerline, contracting the upper back (upper traps) first so the arms open naturally. Focus on the contraction in the back rather than swinging the arms far back, and move slowly and smoothly — going too fast or pushing the arms back too far reduces contraction and can push the shoulders forward."},
  "어깨__b9":{name:"Cable Reverse Fly", tip:"Instead of matching both sides evenly, think of using the right rear deltoid more strongly, while being careful not to rotate your body. If it's hard to isolate the rear deltoid, pulling further back is actually safer for the shoulder."},
  "어깨__b10":{name:"Arnold Press", tip:"Start with palms facing you. Press up keeping the elbows from flaring out to the sides, and once past your forehead, rotate the elbows outward to contract the shoulder. Think of pressing with the torso rather than the arms, with a feeling of slightly stronger contraction on the right, moving through a long range."},
  "어깨__b11":{name:"Front Raise", tip:"From a bent-over position, grip with palms facing up, and think 'push forward' rather than 'lift up.' Focus less on raising high and more on a controlled, momentum-free shoulder contraction driving forward."},
  "어깨__b12":{name:"Neutral-Grip Cable Front Press", tip:"Push the elbows forward first to activate the serratus, then press up as if pulling toward your forehead rather than pushing forward. Keep the elbows from flaring, focus on serratus + front deltoid engagement over height, and pay extra attention to the right side."},
  "어깨__b13":{name:"Dumbbell Shrug", tip:"Pull diagonally back like a barbell row. The body tends to rotate to the left during the movement, so rotate your hips to the right first to stay in proper neutral alignment."},
  "어깨__b14":{name:"Barbell Shrug", tip:"Start from a slightly lowered deadlift-like position, and be careful not to let the shoulders roll forward as you lift. Like a barbell row, the movement needs to go back and up for the upper traps to engage properly. Focus more on the right side movement."},
  "어깨__b15":{name:"Cable Shrug", tip:"Step back, sit down slightly like a deadlift, and lock your torso. Instead of 'pulling straight up,' think 'pulled diagonally back' to engage the upper traps. Make sure the shoulders move back rather than up (which would use the levator scapulae)."},
  "어깨__b16":{name:"Reverse Shrug", tip:"Set a neutral spine, brace your core, then contract the upper traps and lift as if pressing the plates to the ceiling. Think of lifting the forearms up, driving up from the serratus — the right side should be driven up more strongly."},

  "하체__b0":{name:"Back Squat", tip:"High-bar style: set your stance and toe angle tight. Pull the back in hard and dig it in from the moment you un-rack, take a big breath, and brace the torso tight before you un-rack. Keep the weight pressed through the balls of the feet; once the bar and your center of mass align, sit straight down through the hips, and on the way up think 'lift the hips' rather than 'push with the legs' (the hips move first). Don't open the chest first on the way up — keep the same torso angle and drive the hips forward to stand. If you only feel it in your knees or the front of your thighs, that's a sign your posterior chain is weak — don't push through it."},
  "하체__b1":{name:"Goblet Squat", tip:"Hold a plate at your chest. Distribute weight roughly 70% front / 30% back. Sit straight down through the hips, then drive through the balls of the feet to stand up."},
  "하체__b2":{name:"V-Squat", tip:"Don't force a deep descent — only go as deep as where tension hits the front of the thighs. Too deep and the hips drift back, shifting the load. Keep the balls of the feet lifted while pressing into the floor, and bounce out of the bottom with tension still on (descending too slowly wastes elastic energy)."},
  "하체__b3":{name:"Bulgarian Split Squat", tip:"Keep the knees out, and create a slight posterior pelvic tilt to set hip alignment. Since you're working one side at a time, brace your core hard so the hips don't shift sideways."},
  "하체__b4":{name:"Standing Cable Hip Abduction", tip:"Hold the handle at a mid/low position, press the hips down and open the knee as you descend. Focus on opening the knee and squeezing the glute, moving slowly — your right glute activation is low, so think of contracting the right glute harder, while being careful not to let your hips twist. Leaning forward slightly focuses more on the lower glute."},
  "하체__b5":{name:"Inner Thigh Adductor Machine", tip:"Set up with maximum opening to use the adductors fully, and align the machine's axis with your hips. Control the closing motion slowly with a light tap at the end, and don't let your feet go inside your knees (slightly outside is fine). Sit fully back in the seat."},
  "하체__b6":{name:"Leg Curl", tip:"Pull the seat forward using the handle so hip flexion is set up properly. Focus on the hamstrings shortening and lengthening from start to finish without ever losing tension."},
  "하체__b7":{name:"Leg Extension", tip:"Push your hips forward so the front of the thighs is preloaded. Initiate with the force of lifting the knee, and be careful not to focus only on fully extending — that adds knee stress. Follow each set with a seated quad stretch."},
  "하체__b8":{name:"Kickstand RDL", tip:"An RDL variation where one foot is slightly back for support. Keep your hips and torso square to the front while pairing the support leg with the balancing hand."},

  "팔__b0":{name:"Lying Triceps Extension", tip:"With an EZ bar: lower the bar to your forehead, then send it slightly further back so load shifts onto the long head of the triceps. Lower by bending the arm, then take it further back to stretch the long head, and reverse the order on the way up. Pressing it like you're pulling can cause elbow pain — lift it toward your head instead so the long head stays loaded."},
  "팔__b1":{name:"Barbell Curl", tip:"Lift your chest and squeeze your upper back together before starting. Fix the elbows in place and think of pulling from the top of the biceps, lifting at a slow, steady pace so the biceps stay in control. Favor more muscle engagement over heavier weight, and pay attention to the left side, since its contraction tends to be weaker."},

  "컨디셔닝__b0":{name:"Ankle Rehab", tip:"Ankle mobility/stability work. Move slowly within a pain-free range. (Ankle rehab in progress — don't push it.) Example: slow step-downs, 3 sets."},
  "컨디셔닝__b1":{name:"Lying Ankle Band Work", tip:"Lying down, flex/extend the ankle against a resistance band to help restore ankle mobility."},
  "컨디셔닝__b2":{name:"Foot Massage Ball", tip:"Roll a massage ball under the foot to release the plantar fascia and ease ankle/plantar tension."},
  "컨디셔닝__b3":{name:"Single-Leg Stance", tip:"Balance on one leg — trains ankle/hip stability and proprioception."},
  "컨디셔닝__b4":{name:"Hip Rehab", tip:"Hip mobility/stability work using a resistance band or similar. Right glute activation is lower than left, so go slowly and notice the left-right difference."},
  "컨디셔닝__b5":{name:"Cable Side Plank", tip:"Strengthens lateral core stability — resist the cable's pull while preventing torso rotation."},
  "컨디셔닝__b6":{name:"Hanging Leg Hold", tip:"Hang from a bar with legs raised and hold (e.g. 40 sec x 3 sets) — builds core and grip strength."},
  "컨디셔닝__b7":{name:"Pull-Up", tip:"Depress the shoulder blades first, then start pulling — think 'pull with the back,' not the arms. The assisted pull-up machine can also be used to set deep scapular retraction as a primer before overhead pressing."},
  "컨디셔닝__b8":{name:"Foam Roller", tip:"A myofascial release tool. Roll slowly over commonly tight areas before/after training — erector spinae, quadratus lumborum, gluteus medius/minimus."},
  "컨디셔닝__b9":{name:"Massage Ball", tip:"A firm ball for releasing fascia in smaller areas (glutes, feet, etc.)."},
  "컨디셔닝__b10":{name:"Instagram Conditioning 1 (mikaylamailhes)", tip:"Reference link: https://www.instagram.com/reel/DUtVlW-EXSu/?igsh=MWNvaWR3dzhrYXp6aw=="},
  "컨디셔닝__b11":{name:"Instagram Conditioning 2 (mikaylamailhes)", tip:"Reference link: https://www.instagram.com/reel/C7Wt4QVR7MF/?igsh=ejRxOHZwdWd2eWgz"}

let didResetForNewDay = false;

function loadToday(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY_TODAY)) || {}; }catch(e){ return {}; }
}
function saveToday(){
  localStorage.setItem(STORAGE_KEY_TODAY, JSON.stringify(todayState));
  localStorage.setItem(STORAGE_KEY_TODAY_DATE, todayDateKey());
}
function todayDateKey(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`; // 기기의 로컬 시간 기준 (자정에 날짜가 바뀜)
}
function checkAndResetForNewDay(){
  const savedDate = localStorage.getItem(STORAGE_KEY_TODAY_DATE);
  const todayKey = todayDateKey();
  if(savedDate && savedDate !== todayKey){
    todayState = {};
    localStorage.setItem(STORAGE_KEY_TODAY, JSON.stringify(todayState));
    didResetForNewDay = true;
  }
  localStorage.setItem(STORAGE_KEY_TODAY_DATE, todayKey);
}
checkAndResetForNewDay();

function loadWorkoutTimer(){
  let wt;
  try{ wt = JSON.parse(localStorage.getItem(STORAGE_KEY_WORKOUT_TIMER)); }catch(e){ wt = null; }
  if(!wt || typeof wt !== "object"){ wt = {startedAt:null, accumulatedMs:0, running:false, dateKey:todayDateKey()}; }
  if(wt.dateKey !== todayDateKey()){
    // 날짜가 바뀌면 0으로 초기화
    wt = {startedAt:null, accumulatedMs:0, running:false, dateKey:todayDateKey()};
  }
  return wt;
}
function saveWorkoutTimer(){
  workoutTimerState.dateKey = todayDateKey();
  localStorage.setItem(STORAGE_KEY_WORKOUT_TIMER, JSON.stringify(workoutTimerState));
}

function currentWorkoutElapsedMs(){
  let ms = workoutTimerState.accumulatedMs || 0;
  if(workoutTimerState.running && workoutTimerState.startedAt){
    ms += (Date.now() - workoutTimerState.startedAt);
  }
  return ms;
}

// 삭제된 운동 제거 + 수정 내용(override) 적용
const overriddenIds = new Set();
(function applyOverridesAndDeleted(){
  const overrides = loadOverrides();
  const deleted = loadDeleted();
  Object.keys(overrides).forEach(id=> overriddenIds.add(id));
  Object.keys(exercisesData).forEach(cat=>{
    exercisesData[cat] = exercisesData[cat].filter(ex => !deleted.includes(ex.id));
    exercisesData[cat].forEach(ex=>{
      const ov = overrides[ex.id];
      if(ov){
        if(ov.name!==undefined) ex.name = ov.name;
        if(ov.tip!==undefined) ex.tip = ov.tip;
      }
    });
  });
})();

// 운동 메모(PT 팁) 안에 들어있는 URL을 클릭 가능한 링크로 바꿔줍니다.
function linkifyText(text){
  if(!text) return "";
  const escaped = String(text)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const urlRegex = /((?:https?:\/\/|www\.)[^\s<]+)/gi;
  return escaped.replace(urlRegex, (match)=>{
    let trail = "";
    const trailingMatch = match.match(/[).,!?;:'"\]]+$/);
    let core = match;
    if(trailingMatch){ trail = trailingMatch[0]; core = match.slice(0, -trail.length); }
    if(!core) return match;
    const href = /^https?:\/\//i.test(core) ? core : "https://" + core;
    return `<a href="${href}" target="_blank" rel="noopener noreferrer">${core}</a>${trail}`;
  });
}

function syncDoneLength(st){
  const d = st.done || [];
  while(d.length < st.sets) d.push(false);
  while(d.length > st.sets) d.pop();
  st.done = d;

  if(!st.reps) st.reps = [];
  if(!st.weights) st.weights = [];
  const r = st.reps;
  while(r.length < st.sets) r.push(10);
  while(r.length > st.sets) r.pop();
  st.reps = r;
  const w = st.weights;
  while(w.length < st.sets) w.push("");
  while(w.length > st.sets) w.pop();
  st.weights = w;
}

function renderCounter(){
  const list = document.getElementById("counterList");
  const u = t();
  list.innerHTML = "";

  if(entries.length===0){

    }).join("");
    card.innerHTML = `
      <div class="ctop">
        <div class="cname">${displayName}</div>
        <div class="actions">
          <button data-act="reset">↺</button>
          <button data-act="all">✅</button>
        </div>
      </div>
      ${tipText ? `<div class="exTip">${linkifyText(tipText)}</div>` : ""}
      <div class="setRows">${rowsHtml}</div>
      <div class="unitRow">
        <select class="unitSelect">
          <option value="kg" ${st.unit!=="lbs"?"selected":""}>kg</option>
          <option value="lbs" ${st.unit==="lbs"?"selected":""}>lbs</option>
        </select>
      </div>
    `;
    card.querySelectorAll('[data-act="toggleDone"]').forEach(btn=>{
      btn.onclick = ()=>{

        saveToday(); renderCounter();
      };
    });
    card.querySelectorAll('[data-act="repsMinus"]').forEach(btn=>{
      btn.onclick = ()=>{
        const i = +btn.dataset.i;
        st.reps[i] = Math.max(1, (st.reps[i]||1) - 1);
        saveToday(); renderCounter();
      };
    });
    card.querySelectorAll('[data-act="repsPlus"]').forEach(btn=>{
      btn.onclick = ()=>{
        const i = +btn.dataset.i;
        st.reps[i] = Math.min(20, (st.reps[i]||1) + 1);
        saveToday(); renderCounter();

  document.getElementById("progressFill").style.width = pct+"%";

function generateJournal(){
  const u = t();
  const entries = Object.keys(todayState).filter(id=>todayState[id].checked);
  if(entries.length===0){
    document.getElementById("journalOutput").value = u.journalNoSelection;
    return;
  }
  const dateStr = new Date().toLocaleDateString(u.dateLocale, {year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const byCat = {};
  entries.forEach(id=>{
    const s = todayState[id];
    syncDoneLength(s);
    if(!byCat[s.cat]) byCat[s.cat] = [];
    byCat[s.cat].push({id, s});
  });
  let totalSets=0, doneSets=0;
  entries.forEach(id=>{ const s = todayState[id]; totalSets+=s.sets; doneSets+=s.done.filter(Boolean).length; });

  let lines = [];
  lines.push(u.journalTitle(dateStr));
  lines.push("");
  Object.keys(byCat).forEach(cat=>{
    lines.push(`[${getDisplayCat(cat)}]`);
    byCat[cat].forEach(({id, s})=>{
      const ex = findExerciseById(cat, id);
      const displayName = ex ? getDisplayName(ex) : s.name;
      lines.push(`- ${displayName}`);
      s.done.forEach((d,i)=>{
        const reps = (s.reps && s.reps[i]!==undefined) ? s.reps[i] : "";
        const weightVal = (s.weights && s.weights[i]!==undefined && s.weights[i]!==null && String(s.weights[i]).trim()!=="") ? s.weights[i] : "";
        const weightStr = weightVal!=="" ? ` ${weightVal}${s.unit||"kg"}` : "";
        const repsStr = reps!=="" ? `${reps}${u.repsUnit}` : "";
        lines.push(`  ${i+1}${u.sets}: ${repsStr}${weightStr} ${d ? "✅" : "⬜"}`);
      });
    });
    lines.push("");
  });
  lines.push(u.journalTotal(doneSets, totalSets, totalSets? Math.round(doneSets/totalSets*100):0));
  const elapsedMs = currentWorkoutElapsedMs();
  if(elapsedMs > 0){
    const totalSec = Math.floor(elapsedMs/1000);
    const mins = Math.floor(totalSec/60);
    const secs = totalSec%60;
    lines.push(u.journalDuration(mins, secs));
  }
  lines.push("");
  lines.push(`${u.journalCheckpointPrefix} ${getDisplayNote()}`);
  document.getElementById("journalOutput").value = lines.join("\n");
}

let tesseractLoadingPromise = null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();

  tesseractLoadingPromise = new Promise((resolve, reject)=>{
